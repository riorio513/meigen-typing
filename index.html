  { text: "羹に懲りて膾を吹く", reading: "あつものにこりてなますをふく", meaning: "一度の失敗に懲りて必要以上に用心することのたとえ" },
  { text: "前車の轍を踏む", reading: "ぜんしゃのてつをふむ", meaning: "前の人と同じ失敗を繰り返すことのたとえ" },
  { text: "呉越同舟", reading: "ごえつどうしゅう", meaning: "仲の悪い者同士が同じ場所や境遇に居合わせること" },
  { text: "漁夫の利", reading: "ぎょふのり", meaning: "両者が争う隙に第三者が利益を横取りすること" },
  { text: "五十歩百歩", reading: "ごじっぽひゃっぽ", meaning: "少しの違いはあっても本質的には同じであることのたとえ" },
  { text: "四面楚歌", reading: "しめんそか", meaning: "周囲がすべて敵で孤立無援であること" },
  { text: "背水の陣", reading: "はいすいのじん", meaning: "逃げ場をなくし決死の覚悟で事に当たること" },
  { text: "臥薪嘗胆", reading: "がしんしょうたん", meaning: "目的を達成するため長い間苦労に耐え忍ぶこと" },
  { text: "蛇足", reading: "だそく", meaning: "なくてもよい余計な付け足しのこと" },
  { text: "矛盾", reading: "むじゅん", meaning: "二つの物事のつじつまが合わないこと" },
  { text: "五里霧中", reading: "ごりむちゅう", meaning: "手がかりがなく方針や見込みの立たないこと" },
  { text: "杞憂", reading: "きゆう", meaning: "起こりもしないことをあれこれ心配すること" },
  { text: "蛍雪の功", reading: "けいせつのこう", meaning: "苦労して勉学に励みその成果を上げること" },
  { text: "温故知新", reading: "おんこちしん", meaning: "昔のことを研究して新しい知識や道理を得ること" },
  { text: "一期一会", reading: "いちごいちえ", meaning: "一生に一度の出会いを大切にすべきだという心得" },
  { text: "一石二鳥", reading: "いっせきにちょう", meaning: "一つの行為で二つの利益を得ることのたとえ" },
  { text: "竜頭蛇尾", reading: "りゅうとうだび", meaning: "始めは勢いが盛んで終わりは振るわないことのたとえ" },
  { text: "油断大敵", reading: "ゆだんたいてき", meaning: "油断は失敗のもとで最も恐ろしい敵だという戒め" },
  { text: "玉磨かざれば光なし", reading: "たまみがかざればひかりなし", meaning: "素質があっても学び磨かなければ立派にならないという教え" },
  { text: "学問に王道なし", reading: "がくもんにおうどうなし", meaning: "学問を修めるのに楽な近道はないということ" },
  { text: "忠言耳に逆らう", reading: "ちゅうげんみみにさからう", meaning: "ためになる忠告ほど素直に聞き入れにくいということ" },
  { text: "河童に水練", reading: "かっぱにすいれん", meaning: "よく知り尽くしている人にそのことを教える愚かさのたとえ" },
  { text: "釈迦に説法", reading: "しゃかにせっぽう", meaning: "知り尽くしている人に教えを説く愚かさのたとえ" },
  { text: "対岸の火事", reading: "たいがんのかじ", meaning: "自分には関係がなく痛痒を感じないことのたとえ" },
  { text: "火に油を注ぐ", reading: "ひにあぶらをそそぐ", meaning: "勢いの盛んなものにさらに勢いを加えることのたとえ" },
  { text: "飛んで火に入る夏の虫", reading: "とんでひにいるなつのむし", meaning: "自ら進んで危険や災難に飛び込むことのたとえ" },
  { text: "瓜の蔓に茄子はならぬ", reading: "うりのつるになすびはならぬ", meaning: "平凡な親から非凡な子は生まれないというたとえ" },
  { text: "口は禍の門", reading: "くちはわざわいのかど", meaning: "不用意な発言が災いを招くもとになるという戒め" },
  { text: "口は災いの元", reading: "くちはわざわいのもと", meaning: "うっかりした言葉が災いを招くもとになるという戒め" },
  { text: "沈黙は金雄弁は銀", reading: "ちんもくはきんゆうべんはぎん", meaning: "多くを語らないことは雄弁にまさる価値があるということ" },
  { text: "言わぬが花", reading: "いわぬがはな", meaning: "はっきり言わない方が趣があり奥ゆかしいということ" },
  { text: "出藍の誉れ", reading: "しゅつらんのほまれ", meaning: "弟子が師よりも優れた才能を発揮することのたとえ" },
  { text: "青は藍より出でて藍より青し", reading: "あおはあいよりいでてあいよりあおし", meaning: "弟子が師よりも優れることのたとえ" },
  { text: "桃栗三年柿八年", reading: "ももくりさんねんかきはちねん", meaning: "何事も成果を得るには相応の年月が必要だということ" },
  { text: "一年の計は元旦にあり", reading: "いちねんのけいはがんたんにあり", meaning: "何事も最初にしっかり計画を立てることが大切だということ" },
  { text: "果報は寝て待て", reading: "かほうはねてまて", meaning: "幸運は焦らず自然に訪れるのを待つのがよいということ" },
  { text: "人事を尽くして天命を待つ", reading: "じんじをつくしててんめいをまつ", meaning: "全力を尽くしたら後は天の定めに任せるということ" },
  { text: "弘法筆を選ばず", reading: "こうぼうふでをえらばず", meaning: "名人は道具の良し悪しに関わらず立派な仕事をするということ" },
  { text: "下手の横好き", reading: "へたのよこずき", meaning: "上手でもないのにそのことが好きで熱心なこと" },
  { text: "虻蜂取らず", reading: "あぶはちとらず", meaning: "欲張って両方を狙い結局どちらも得られないことのたとえ" },
  { text: "秋の日は釣瓶落とし", reading: "あきのひはつるべおとし", meaning: "秋の日暮れは非常に早いことのたとえ" },
  { text: "冬来たりなば春遠からじ", reading: "ふゆきたりなばはるとおからじ", meaning: "つらい時期を耐えれば必ず良い時が来るということ" },
  { text: "金は天下の回り物", reading: "かねはてんかのまわりもの", meaning: "お金は一所にとどまらず世の中を巡っていくものだということ" },
  { text: "安物買いの銭失い", reading: "やすものがいのぜにうしない", meaning: "安価なものは品質が悪くかえって損をするということ" },
  { text: "損して得取れ", reading: "そんしてとくとれ", meaning: "目先の損より先の大きな利益を見据えて行動せよということ" },
  { text: "一銭を笑う者は一銭に泣く", reading: "いっせんをわらうものはいっせんになく", meaning: "わずかな金を粗末にする者はその金で苦労するということ" },
  { text: "親の心子知らず", reading: "おやのこころこしらず", meaning: "親の深い思いを子はなかなか理解できないということ" },
  { text: "子は鎹", reading: "こはかすがい", meaning: "子の存在が夫婦の仲をつなぎとめる役割を果たすということ" },
  { text: "可愛い子には旅をさせよ", reading: "かわいいこにはたびをさせよ", meaning: "子は甘やかさずあえて苦労を経験させるのがよいという教え" },
  { text: "紺屋の白袴", reading: "こうやのしろばかま", meaning: "他人のためには忙しく働くが自分のことは疎かにしがちなこと" },
  { text: "遠くの親戚より近くの他人", reading: "とおくのしんせきよりちかくのたにん", meaning: "いざという時は遠い親戚より近くの他人が頼りになるということ" },
  { text: "類は友を呼ぶ", reading: "るいはともをよぶ", meaning: "似た者同士は自然と集まり親しくなるということ" },
  { text: "朱に交われば赤くなる", reading: "しゅにまじわればあかくなる", meaning: "人は付き合う相手や環境に感化されるということ" },
  { text: "生き馬の目を抜く", reading: "いきうまのめをぬく", meaning: "油断もすきもなく素早く抜け目なく利を得ることのたとえ" },
  { text: "病は気から", reading: "やまいはきから", meaning: "病気は気の持ちようで悪くも良くもなるということ" },
  { text: "命あっての物種", reading: "いのちあってのものだね", meaning: "何事も命があってこそ成り立つものだということ" },
  { text: "命長ければ恥多し", reading: "いのちながければはじおおし", meaning: "長生きするとその分恥をかくことも多くなるということ" },
  { text: "栴檀は双葉より芳し", reading: "せんだんはふたばよりかんばし", meaning: "大成する人は幼い頃から優れた片鱗を見せるということ" },
  { text: "瓢箪から駒が出る", reading: "ひょうたんからこまがでる", meaning: "意外なところから思いがけない結果が出ることのたとえ" },
  { text: "後悔先に立たず", reading: "こうかいさきにたたず", meaning: "事が済んだ後で後悔しても取り返しがつかないということ" },
  { text: "盛者必衰", reading: "じょうしゃひっすい", meaning: "勢いの盛んな者もいつか必ず衰えるということ" },
  { text: "驕る平家は久しからず", reading: "おごるへいけはひさしからず", meaning: "権勢に驕り高ぶる者は長く続かないというたとえ" },
  { text: "腹八分目に医者いらず", reading: "はらはちぶんめにいしゃいらず", meaning: "食事を腹八分目にしておけば健康でいられるということ" },
  { text: "習うより慣れよ", reading: "ならうよりなれよ", meaning: "人に教わるより自ら経験を重ねる方が身につくということ" },
  { text: "経験に勝る教師なし", reading: "けいけんにまさるきょうしなし", meaning: "実際の経験ほど優れた教えはないということ" },
  { text: "虎の尾を踏む", reading: "とらのおをふむ", meaning: "非常に危険なことを行うことのたとえ" },
  { text: "備えあれば憂いなし", reading: "そなえあればうれいなし", meaning: "普段から備えておけばいざという時に心配がないということ" },
  { text: "危ない橋を渡る", reading: "あぶないはしをわたる", meaning: "危険を承知の上で物事を行うことのたとえ" },
  { text: "君子危うきに近寄らず", reading: "くんしあやうきにちかよらず", meaning: "徳のある人は自ら危険に近づかないということ" },
  { text: "藪をつついて蛇を出す", reading: "やぶをつついてへびをだす", meaning: "余計なことをして自ら災いを招くことのたとえ" },
  { text: "寝耳に水", reading: "ねみみにみず", meaning: "突然の出来事に非常に驚くことのたとえ" },
  { text: "青天の霹靂", reading: "せいてんのへきれき", meaning: "突然起こる思いがけない大事件のたとえ" },
  { text: "人の振り見て我が振り直せ", reading: "ひとのふりみてわがふりなおせ", meaning: "他人の言動を見て自分の行いを反省し改めよという教え" },
  { text: "他山の石", reading: "たざんのいし", meaning: "他人のつまらない言動も自分の修養の助けになるということ" },
  { text: "隗より始めよ", reading: "かいよりはじめよ", meaning: "大事を成すにはまず身近なことから着手せよという教え" },
  { text: "雨だれ石を穿つ", reading: "あまだれいしをうがつ", meaning: "小さな努力でも根気よく続ければ大きな成果を得るということ" },
  { text: "鉄は熱いうちに打て", reading: "てつはあついうちにうて", meaning: "物事は好機を逃さず適切な時機に行うべきだという教え" },
  { text: "思い立ったが吉日", reading: "おもいたったがきちじつ", meaning: "何かをしようと思ったらすぐ実行するのがよいということ" },
  { text: "善は急げ", reading: "ぜんはいそげ", meaning: "良いと思ったことはためらわずすぐ実行せよという教え" },
  { text: "過ぎたるは猶及ばざるが如し", reading: "すぎたるはなおおよばざるがごとし", meaning: "何事もやり過ぎは足りないのと同じくよくないということ" },
  { text: "転石苔を生ぜず", reading: "てんせきこけをしょうぜず", meaning: "職や住居を転々と変える人は大成しないというたとえ" },
  { text: "石橋を叩いても渡らない", reading: "いしばしをたたいてもわたらない", meaning: "用心深すぎてかえって行動できないことのたとえ" },
  { text: "医者と味噌は古いほどよい", reading: "いしゃとみそはふるいほどよい", meaning: "経験を積んだ医者や熟成した味噌は良いというたとえ" },
  { text: "老いの一徹", reading: "おいのいってつ", meaning: "年をとると考えを変えず頑固になりやすいこと" },
  { text: "桜切る馬鹿梅切らぬ馬鹿", reading: "さくらきるばかうめきらぬばか", meaning: "木の性質に応じた手入れをすべきだという教え" },
  { text: "好事魔多し", reading: "こうじまおおし", meaning: "良いことには邪魔が入りやすいということ" },
  { text: "明日ありと思う心の仇桜", reading: "あすありとおもうこころのあだざくら", meaning: "明日があると油断していると思わぬ災いにあうたとえ" },
  { text: "濡れぬ先の傘", reading: "ぬれぬさきのかさ", meaning: "災難が起こる前にあらかじめ用心することのたとえ" },
  { text: "蟷螂の斧", reading: "とうろうのおの", meaning: "弱者が力量もわきまえず強者に立ち向かうことのたとえ" },
  { text: "一富士二鷹三茄子", reading: "いちふじにたかさんなすび", meaning: "初夢に見ると縁起が良いとされるものの順序" },
  { text: "大山鳴動して鼠一匹", reading: "たいざんめいどうしてねずみいっぴき", meaning: "前触れの騒ぎばかり大きく結果は小さいことのたとえ" },
  { text: "九仞の功を一簣に虧く", reading: "きゅうじんのこうをいっきにかく", meaning: "長年の努力も最後のわずかな油断で無駄になることのたとえ" },
  { text: "石が流れて木の葉が沈む", reading: "いしがながれてこのはがしずむ", meaning: "道理が逆さまで物事があべこべであることのたとえ" },
  { text: "上手の手から水が漏る", reading: "じょうずのてからみずがもる", meaning: "名人でも時には失敗することがあるということ" },
  { text: "千慮の一失", reading: "せんりょのいっしつ", meaning: "賢い人でも多くの考えの中には一つくらい失敗があること" },
  { text: "寝た子を起こす", reading: "ねたこをおこす", meaning: "収まっている物事にわざわざ手を出し問題を蒸し返すこと" },
  { text: "明日は我が身", reading: "あすはわがみ", meaning: "他人の不幸も明日は自分の身に起こるかもしれないということ" },
  { text: "一念岩をも通す", reading: "いちねんいわをもとおす", meaning: "強い意志で行えばどんな困難も成し遂げられるということ" },
  { text: "石に立つ矢", reading: "いしにたつや", meaning: "一心に努力すればどんな難事も成し遂げられるということ" },
  { text: "精神一到何事か成らざらん", reading: "せいしんいっとうなにごとかならざらん", meaning: "精神を集中すれば成し遂げられないことはないという教え" },
  { text: "雉も鳴かずば撃たれまい", reading: "きじもなかずばうたれまい", meaning: "余計なことを言わなければ災いを招かずに済むということ" },
  { text: "花は根に鳥は古巣に", reading: "はなはねにとりはふるすに", meaning: "物事はすべて元の場所へ帰るというたとえ" },
  { text: "京の着倒れ大阪の食い倒れ", reading: "きょうのきだおれおおさかのくいだおれ", meaning: "京都は衣服に大阪は食に贅沢するということ" },
  { text: "商いは牛の涎", reading: "あきないはうしのよだれ", meaning: "商売は気長に辛抱強く続けることが大事だということ" },
  { text: "芸は身を助く", reading: "げいはみをたすく", meaning: "身につけた芸や技能がいざという時に生計を助けるということ" },
  { text: "猫の手も借りたい", reading: "ねこのてもかりたい", meaning: "非常に忙しく手が足りず誰の助けでも欲しいことのたとえ" },
  { text: "猫に鰹節", reading: "ねこにかつおぶし", meaning: "過ちが起こりやすく油断できない状況のたとえ" },
  { text: "泥棒を捕らえて縄を綯う", reading: "どろぼうをとらえてなわをなう", meaning: "事が起きてから慌てて準備することのたとえ" },
  { text: "蟻の穴から堤も崩れる", reading: "ありのあなからつつみもくずれる", meaning: "わずかな油断や不注意が大事を引き起こすことのたとえ" },
  { text: "天に唾する", reading: "てんにつばする", meaning: "人に害を与えようとして結局自分が害を受けることのたとえ" },
  { text: "憎まれっ子世にはばかる", reading: "にくまれっこよにはばかる", meaning: "人に憎まれる者ほどかえって世間で幅を利かせるということ" },
  { text: "女心と秋の空", reading: "おんなごころとあきのそら", meaning: "人の心は秋の空のように変わりやすいということ" },
  { text: "花に嵐", reading: "はなにあらし", meaning: "良いことには邪魔が入りやすくこの世は無常だということ" },
  { text: "一を聞いて十を知る", reading: "いちをきいてじゅうをしる", meaning: "物事の一部を聞いただけで全体を理解する聡明さのたとえ" },
  { text: "秋茄子は嫁に食わすな", reading: "あきなすはよめにくわすな", meaning: "美味しい秋茄子は嫁に食べさせるなという言い伝え" },
  { text: "縁は異なもの味なもの", reading: "えんはいなものあじなもの", meaning: "男女の縁は不思議で面白いものだということ" },
  { text: "転んでもただでは起きない", reading: "ころんでもただではおきない", meaning: "失敗してもそこから何か利益を得ようとするたくましさのたとえ" },
  { text: "一難去ってまた一難", reading: "いちなんさってまたいちなん", meaning: "一つの災難が去ってもまた次の災難が襲ってくること" },
  { text: "逃がした魚は大きい", reading: "にがしたさかなはおおきい", meaning: "手に入れ損なったものは実際より価値があるように思えること" },
  { text: "馬子にも衣装", reading: "まごにもいしょう", meaning: "つまらない者でも外面を飾れば立派に見えるということ" },
  { text: "猫も杓子も", reading: "ねこもしゃくしも", meaning: "誰も彼も皆こぞってということ" },
  { text: "犬に論語", reading: "いぬにろんご", meaning: "道理を説いても理解できない者には無駄なことのたとえ" },
  { text: "豚も煽てりゃ木に登る", reading: "ぶたもおだてりゃきにのぼる", meaning: "おだてれば凡人でも力以上のことをするということ" },
  { text: "猿に烏帽子", reading: "さるにえぼし", meaning: "外見や地位が人柄に不釣り合いなことのたとえ" },
  { text: "鯛の尾より鰯の頭", reading: "たいのおよりいわしのあたま", meaning: "大集団の末端より小集団の頭でいる方がよいということ" },
  { text: "河豚は食いたし命は惜しし", reading: "ふぐはくいたしいのちはおしし", meaning: "欲しいが危険を冒すのはためらわれるという板挟みの心情" },
  { text: "泣く子と地頭には勝てぬ", reading: "なくことじとうにはかてぬ", meaning: "道理の通じない相手には従うほかないということ" },
  { text: "長い物には巻かれろ", reading: "ながいものにはまかれろ", meaning: "力のある者には逆らわず従った方が得だということ" },
  { text: "寄らば大樹の陰", reading: "よらばたいじゅのかげ", meaning: "頼るならば勢力のある大きなものを選ぶのがよいということ" },
  { text: "窮鼠猫を噛む", reading: "きゅうそねこをかむ", meaning: "追い詰められた弱者が強者に必死に反撃することのたとえ" },
  { text: "鳴く猫は鼠を捕らぬ", reading: "なくねこはねずみをとらぬ", meaning: "よくしゃべる者ほど実行が伴わないことのたとえ" },
  { text: "負けるが勝ち", reading: "まけるがかち", meaning: "争わず一歩譲る方が結局は勝ちにつながるということ" },

const YOON_ALT = {
  'きゃ':['kya'], 'きゅ':['kyu'], 'きょ':['kyo'],
  'しゃ':['sha','sya'], 'しゅ':['shu','syu'], 'しょ':['sho','syo'],
  'ちゃ':['cha','tya'], 'ちゅ':['chu','tyu'], 'ちょ':['cho','tyo'],
  'にゃ':['nya'], 'にゅ':['nyu'], 'にょ':['nyo'],
  'ひゃ':['hya'], 'ひゅ':['hyu'], 'ひょ':['hyo'],
  'みゃ':['mya'], 'みゅ':['myu'], 'みょ':['myo'],
  'りゃ':['rya'], 'りゅ':['ryu'], 'りょ':['ryo'],
  'ぎゃ':['gya'], 'ぎゅ':['gyu'], 'ぎょ':['gyo'],
  'じゃ':['ja','zya','jya'], 'じゅ':['ju','zyu','jyu'], 'じょ':['jo','zyo','jyo'],
  'びゃ':['bya'], 'びゅ':['byu'], 'びょ':['byo'],
  'ぴゃ':['pya'], 'ぴゅ':['pyu'], 'ぴょ':['pyo'],
};

const SINGLE_ALT = {
  'あ':['a'], 'い':['i'], 'う':['u'], 'え':['e'], 'お':['o'],
  'か':['ka'], 'き':['ki'], 'く':['ku'], 'け':['ke'], 'こ':['ko'],
  'さ':['sa'], 'し':['shi','si'], 'す':['su'], 'せ':['se'], 'そ':['so'],
  'た':['ta'], 'ち':['chi','ti'], 'つ':['tsu','tu'], 'て':['te'], 'と':['to'],
  'な':['na'], 'に':['ni'], 'ぬ':['nu'], 'ね':['ne'], 'の':['no'],
  'は':['ha'], 'ひ':['hi'], 'ふ':['fu','hu'], 'へ':['he'], 'ほ':['ho'],
  'ま':['ma'], 'み':['mi'], 'む':['mu'], 'め':['me'], 'も':['mo'],
  'や':['ya'], 'ゆ':['yu'], 'よ':['yo'],
  'ら':['ra'], 'り':['ri'], 'る':['ru'], 'れ':['re'], 'ろ':['ro'],
  'わ':['wa'], 'を':['wo','o'], 'ん':['n','nn'],
  'が':['ga'], 'ぎ':['gi'], 'ぐ':['gu'], 'げ':['ge'], 'ご':['go'],
  'ざ':['za'], 'じ':['ji','zi'], 'ず':['zu'], 'ぜ':['ze'], 'ぞ':['zo'],
  'だ':['da'], 'ぢ':['ji','di'], 'づ':['zu','du'], 'で':['de'], 'ど':['do'],
  'ば':['ba'], 'び':['bi'], 'ぶ':['bu'], 'べ':['be'], 'ぼ':['bo'],
  'ぱ':['pa'], 'ぴ':['pi'], 'ぷ':['pu'], 'ぺ':['pe'], 'ぽ':['po'],
};

function buildUnitsFromReading(reading) {
  const chars = Array.from(reading);
  const units = [];
  let i = 0;
  while (i < chars.length) {
    const c = chars[i];
    if (c === 'っ' && i + 1 < chars.length) {
      const two = chars.slice(i + 1, i + 3).join('');
      let baseAlts;
      let consumed;
      if (YOON_ALT[two]) {
        baseAlts = YOON_ALT[two];
        consumed = 3;
      } else {
        baseAlts = SINGLE_ALT[chars[i + 1]] || [chars[i + 1]];
        consumed = 2;
      }
      const alts = baseAlts.map((a) => (a.startsWith('ch') ? 't' : a[0]) + a);
      units.push({ display: alts[0], alternatives: alts });
      i += consumed;
      continue;
    }
    const two = chars.slice(i, i + 2).join('');
    if (YOON_ALT[two]) {
      units.push({ display: YOON_ALT[two][0], alternatives: YOON_ALT[two] });
      i += 2;
      continue;
    }
    const alts = SINGLE_ALT[c] || [c];
    units.push({ display: alts[0], alternatives: alts });
    i += 1;
  }
  return units;
}

function getProverb(index) {
  return PROVERBS[index];
}

function getQuoteUnits(index) {
  const q = PROVERBS[index];
  return {
    units: buildUnitsFromReading(q.reading),
    reference: q.text,
    note: q.meaning ? '意味: ' + q.meaning : null,
    reading: q.reading,
  };
}

function quoteCount() {
  return PROVERBS.length;
}

function pickNextIndex(prevIndex, total) {
  if (total <= 1) return 0;
  let idx = Math.floor(Math.random() * total);
  while (idx === prevIndex) {
    idx = Math.floor(Math.random() * total);
  }
  return idx;
}

// Types one key against a falling enemy, mutating its typing progress.
// Returns 'wrong' | 'progress' | 'complete'. Handles ambiguous romaji such as
// ん (["n","nn"]) the same way the main typing screen does.
function typeCharOnEnemy(en, typed) {
  const units = en.units;
  let uIdx = en.unitIndex;
  if (uIdx >= units.length) return 'complete';
  let offset = en.typedOffset;
  let cands = en.candidates;
  let matching = cands.filter((c) => c[offset] === typed);

  if (matching.length === 0 && en.pending) {
    // A shorter reading already completed (e.g. "n"); this key belongs to the
    // next unit. Commit the short reading and retry against the next unit.
    en.unitIndex = uIdx + 1;
    en.typedOffset = 0;
    en.pending = null;
    uIdx = en.unitIndex;
    if (uIdx >= units.length) return 'complete';
    en.candidates = units[uIdx].alternatives;
    offset = 0;
    cands = en.candidates;
    matching = cands.filter((c) => c[offset] === typed);
  }

  if (matching.length === 0) return 'wrong';

  en.typedRomaji += typed;
  const newOffset = offset + 1;
  const exact = matching.filter((c) => c.length === newOffset);
  const longer = matching.filter((c) => c.length > newOffset);

  if (exact.length > 0 && longer.length > 0) {
    // Ambiguous (only ん: "n" done but "nn" still viable). Accept the short "n"
    // now when there is no following key that could resolve it: at the last
    // unit, or before a な-row sound (e.g. 三年=さんねん typed "sannen", where the
    // next "n" belongs to ね). Otherwise keep "nn" alive as a pending commit.
    const isLast = uIdx + 1 >= units.length;
    const nextStartsN = !isLast && units[uIdx + 1].alternatives.every((a) => a[0] === 'n');
    if (isLast || nextStartsN) {
      en.unitIndex = uIdx + 1;
      en.typedOffset = 0;
      en.pending = null;
      if (en.unitIndex >= units.length) return 'complete';
      en.candidates = units[en.unitIndex].alternatives;
      return 'progress';
    }
    en.pending = exact[0];
    en.typedOffset = newOffset;
    en.candidates = matching;
    return 'progress';
  } else if (exact.length > 0) {
    en.unitIndex = uIdx + 1;
    en.typedOffset = 0;
    en.pending = null;
    if (en.unitIndex >= units.length) return 'complete';
    en.candidates = units[en.unitIndex].alternatives;
    return 'progress';
  } else {
    en.pending = null;
    en.typedOffset = newOffset;
    en.candidates = matching;
    return 'progress';
  }
}

// ===== シューティングモード =====
function ShootingGame({ onExit }) {
  const [, setFrame] = useState(0);
  const [score, setScore] = useState(0);
  const [lives, setLives] = useState(5);
  const [level, setLevel] = useState(1);
  const [defeated, setDefeated] = useState(0);
  const [status, setStatus] = useState('playing'); // 'playing' | 'over'
  const [lastKill, setLastKill] = useState(null);
  const [highScore, setHighScore] = useState(() => {
    const v = Number(localStorage.getItem('shootingHighScore') || 0);
    return isNaN(v) ? 0 : v;
  });

  const areaRef = useRef(null);
  const enemiesRef = useRef([]);
  const explosionsRef = useRef([]);
  const activeIdRef = useRef(null);
  const nextIdRef = useRef(1);
  const statusRef = useRef('playing');
  const scoreRef = useRef(0);
  const livesRef = useRef(5);
  const levelRef = useRef(1);
  const defeatedRef = useRef(0);
  const lastSpawnRef = useRef(0);
  const lastFrameRef = useRef(0);
  const shakeIdRef = useRef(null);

  const forceRender = () => setFrame((f) => (f + 1) % 1000000);

  const spawnInterval = () => Math.max(900, 2600 - (levelRef.current - 1) * 220);

  const spawnEnemy = useCallback(() => {
    const idx = Math.floor(Math.random() * quoteCount());
    const q = getProverb(idx);
    const units = buildUnitsFromReading(q.reading);
    enemiesRef.current.push({
      id: nextIdRef.current++,
      text: q.text,
      reading: q.reading,
      meaning: q.meaning,
      units,
      x: 14 + Math.random() * 72, // percent of area width (card is centered on x)
      y: -40,
      speed: 0.34 + Math.random() * 0.16 + (levelRef.current - 1) * 0.05,
      unitIndex: 0,
      typedOffset: 0,
      candidates: units[0] ? units[0].alternatives : [],
      pending: null,
      typedRomaji: '',
    });
  }, []);

  const endGame = useCallback(() => {
    statusRef.current = 'over';
    setStatus('over');
    const s = scoreRef.current;
    setHighScore((h) => {
      const nh = Math.max(h, s);
      localStorage.setItem('shootingHighScore', String(nh));
      return nh;
    });
  }, []);

  // Game loop
  useEffect(() => {
    let raf;
    const loop = (t) => {
      if (!lastFrameRef.current) lastFrameRef.current = t;
      const dt = Math.min(64, t - lastFrameRef.current);
      lastFrameRef.current = t;

      if (statusRef.current === 'playing') {
        const area = areaRef.current;
        const areaH = area ? area.clientHeight : 520;
        const escapeY = areaH - 78;

        if (t - lastSpawnRef.current > spawnInterval()) {
          lastSpawnRef.current = t;
          spawnEnemy();
        }

        const survivors = [];
        let lostLife = 0;
        for (const en of enemiesRef.current) {
          en.y += en.speed * (dt / 16);
          if (en.y >= escapeY) {
            lostLife += 1;
            if (activeIdRef.current === en.id) activeIdRef.current = null;
            explosionsRef.current.push({ id: nextIdRef.current++, x: en.x, y: escapeY, kind: 'escape', born: t });
          } else {
            survivors.push(en);
          }
        }
        enemiesRef.current = survivors;

        if (lostLife > 0) {
          const nl = Math.max(0, livesRef.current - lostLife);
          livesRef.current = nl;
          setLives(nl);
          if (nl <= 0) endGame();
        }

        explosionsRef.current = explosionsRef.current.filter((ex) => t - ex.born < 600);
      }

      forceRender();
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [spawnEnemy, endGame]);

  const handleKey = useCallback((e) => {
    if (statusRef.current !== 'playing') return;
    if (e.isComposing || e.keyCode === 229) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length !== 1) return;
    e.preventDefault();

    const key = e.key.toLowerCase();
    const live = enemiesRef.current;
    if (live.length === 0) return;

    let target = null;
    if (activeIdRef.current != null) {
      target = live.find((en) => en.id === activeIdRef.current) || null;
    }
    if (!target) {
      const sorted = live.slice().sort((a, b) => b.y - a.y);
      target = sorted.find((en) => en.candidates.some((c) => c[en.typedOffset] === key)) || sorted[0];
      activeIdRef.current = target.id;
    }

    const res = typeCharOnEnemy(target, key);

    if (res === 'wrong') {
      shakeIdRef.current = target.id;
      setTimeout(() => { if (shakeIdRef.current === target.id) shakeIdRef.current = null; }, 180);
    } else if (res === 'complete') {
      enemiesRef.current = enemiesRef.current.filter((en) => en.id !== target.id);
      activeIdRef.current = null;
      explosionsRef.current.push({ id: nextIdRef.current++, x: target.x, y: target.y, kind: 'kill', born: performance.now() });
      const gain = 100 + target.reading.length * 10;
      scoreRef.current += gain;
      setScore(scoreRef.current);
      defeatedRef.current += 1;
      setDefeated(defeatedRef.current);
      const newLevel = 1 + Math.floor(defeatedRef.current / 6);
      if (newLevel !== levelRef.current) {
        levelRef.current = newLevel;
        setLevel(newLevel);
      }
      setLastKill({ id: target.id, text: target.text, meaning: target.meaning });
    }

    forceRender();
  }, []);

  useEffect(() => {
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [handleKey]);

  const restart = () => {
    enemiesRef.current = [];
    explosionsRef.current = [];
    activeIdRef.current = null;
    scoreRef.current = 0; setScore(0);
    livesRef.current = 5; setLives(5);
    levelRef.current = 1; setLevel(1);
    defeatedRef.current = 0; setDefeated(0);
    lastSpawnRef.current = 0;
    lastFrameRef.current = 0;
    setLastKill(null);
    statusRef.current = 'playing';
    setStatus('playing');
  };

  const stars = React.useMemo(() => (
    Array.from({ length: 26 }, (_, i) => ({
      id: i,
      left: Math.random() * 100,
      top: Math.random() * 100,
      size: 1 + Math.random() * 2,
      delay: Math.random() * 3,
    }))
  ), []);

  const enemies = enemiesRef.current;

  return (
    <div className="fixed inset-0 z-40">
      <div ref={areaRef} className="relative w-full h-full overflow-hidden game-sky">
        {stars.map((s) => (
          <div key={s.id} className="game-star" style={{
            left: s.left + '%', top: s.top + '%',
            width: s.size + 'px', height: s.size + 'px',
            animationDelay: s.delay + 's',
          }} />
        ))}

        {/* HUD */}
        <div className="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-4 sm:px-6 py-3 text-[#f4ecd8]">
          <div className="flex items-center gap-4 sm:gap-6 typewriter-font text-xs sm:text-sm">
            <div className="flex flex-col leading-tight">
              <span className="text-[10px] text-[#c9b98f] tracking-widest">SCORE</span>
              <span className="text-lg sm:text-2xl">{score}</span>
            </div>
            <div className="flex flex-col leading-tight">
              <span className="text-[10px] text-[#c9b98f] tracking-widest">LEVEL</span>
              <span className="text-lg sm:text-2xl">{level}</span>
            </div>
            <div className="flex flex-col leading-tight">
              <span className="text-[10px] text-[#c9b98f] tracking-widest">撃退</span>
              <span className="text-lg sm:text-2xl">{defeated}</span>
            </div>
          </div>
          <div className="flex items-center gap-3 sm:gap-4">
            <div className="text-lg sm:text-2xl tracking-tight" title="ライフ">
              {'♥'.repeat(lives)}<span className="text-[#6b5a3f]">{'♥'.repeat(Math.max(0, 5 - lives))}</span>
            </div>
            <button
              onClick={onExit}
              className="retro-btn px-3 sm:px-4 py-1.5 bg-[#5c4a32] text-[#f4ecd8] text-xs sm:text-sm shadow hover:bg-[#493a27] active:scale-95 transition"
            >
              終了
            </button>
          </div>
        </div>

        {/* Enemies */}
        {enemies.map((en) => {
          const isActive = activeIdRef.current === en.id;
          const isShaking = shakeIdRef.current === en.id;
          const typed = en.typedRomaji;
          const remainingCurrent = (en.candidates[0] || '').slice(en.typedOffset);
          const future = en.units.slice(en.unitIndex + 1).map((u) => u.alternatives[0]).join('');
          const romaji = typed + remainingCurrent + future;
          const typedLen = typed.length;
          return (
            <div
              key={en.id}
              className={'enemy-card px-3 py-2 sm:px-4 sm:py-2.5 ' + (isActive ? 'enemy-active ' : '') + (isShaking ? 'enemy-shake' : '')}
              style={{ left: en.x + '%', top: en.y + 'px', transform: 'translateX(-50%)', maxWidth: '80vw', width: 'max-content' }}
            >
              <p className="mincho-font text-center text-[#3a2f1e] text-sm sm:text-lg leading-snug whitespace-nowrap">{en.text}</p>
              <p className="typewriter-font text-center text-[11px] sm:text-sm mt-1 tracking-wide whitespace-nowrap">
                {romaji.split('').map((ch, i) => {
                  let cls = 'char-pending';
                  if (i < typedLen) cls = 'char-correct';
                  else if (i === typedLen) cls = 'char-current';
                  return <span key={i} className={cls}>{ch}</span>;
                })}
              </p>
            </div>
          );
        })}

        {/* Explosions */}
        {explosionsRef.current.map((ex) => (
          <div
            key={ex.id}
            className={ex.kind === 'kill' ? 'kill-burst' : 'escape-burst'}
            style={{ left: ex.x + '%', top: ex.y + 'px', fontSize: ex.kind === 'kill' ? '34px' : '26px' }}
          >
            {ex.kind === 'kill' ? '✕' : '↓'}
          </div>
        ))}

        {/* Danger line */}
        <div className="danger-line" style={{ bottom: '74px' }} />
        <p className="absolute left-1/2 -translate-x-1/2 text-[10px] tracking-[0.3em] text-[#e07a5f]" style={{ bottom: '80px' }}>
          撃退ライン
        </p>

        {/* Instruction / last kill */}
        <div className="absolute left-0 right-0 flex flex-col items-center gap-1" style={{ bottom: '20px' }}>
          {lastKill && (
            <div key={lastKill.id} className="kill-banner paper-card rounded-sm px-4 py-2 max-w-[92vw] text-center">
              <span className="mincho-font text-[#3a2f1e] text-sm">{lastKill.text}</span>
              <span className="typewriter-font text-[#8a7a56] text-[11px]">　—　{lastKill.meaning}</span>
            </div>
          )}
          <p className="typewriter-font text-[11px] sm:text-xs text-[#c9b98f] tracking-wide">
            落ちてくることわざを、ラインに届く前にローマ字でタイプして撃退せよ！
          </p>
        </div>

        {/* Game over */}
        {status === 'over' && (
          <div className="absolute inset-0 bg-[#160f07]/80 flex items-center justify-center z-30 p-4">
            <div className="paper-card rounded-sm px-10 py-10 w-full max-w-sm text-center">
              <h2 className="typewriter-font text-2xl text-[#3a2f1e] mb-6 tracking-wide">Game Over</h2>
              <div className="mb-4">
                <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">スコア</p>
                <p className="typewriter-font text-4xl text-[#3a2f1e]">{score}</p>
              </div>
              <div className="mb-6">
                <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">撃退数</p>
                <p className="typewriter-font text-2xl text-[#3a2f1e]">{defeated}</p>
              </div>
              <div className="mb-8 pt-4 border-t border-[#d9cba8]">
                <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">ハイスコア</p>
                <p className="typewriter-font text-2xl text-[#3a2f1e]">{highScore}</p>
              </div>
              <button
                onClick={restart}
                className="retro-btn w-full px-5 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
              >
                もう一度
              </button>
              <button
                onClick={onExit}
                className="retro-btn w-full mt-3 px-5 py-3 bg-transparent text-[#5c4a32] border border-[#5c4a32] tracking-wider hover:bg-[#5c4a32]/10 active:scale-95 transition"
              >
                トップに戻る
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('top'); // 'top' | 'app' | 'shooting'
  const [authLoading, setAuthLoading] = useState(true);
  const [authUser, setAuthUser] = useState(null);
  const [authError, setAuthError] = useState('');
  const [resetSent, setResetSent] = useState(false);
  const [emailInput, setEmailInput] = useState('');
  const [passwordInput, setPasswordInput] = useState('');
  const [cumulativeTotal, setCumulativeTotal] = useState(0);
  const [cumulativeCorrect, setCumulativeCorrect] = useState(0);

  const authUserRef = useRef(null);
  const screenRef = useRef('top');
  const cumulativeTotalRef = useRef(0);
  const cumulativeCorrectRef = useRef(0);

  useEffect(() => { authUserRef.current = authUser; }, [authUser]);
  useEffect(() => { screenRef.current = screen; }, [screen]);

  useEffect(() => {
    if (typeof firebase === 'undefined' || !firebase.apps || !firebase.apps.length) {
      setAuthError('Firebaseの設定が完了していません。firebase-config.js を確認してください。');
      setAuthLoading(false);
      return;
    }
    const auth = firebase.auth();

    const unsubscribe = auth.onAuthStateChanged((u) => {
      setAuthUser(u);
      setAuthLoading(false);
      if (u) {
        firebase.firestore().collection('typingStats').doc(u.uid).get()
          .then((doc) => {
            const data = doc.data();
            const total = (data && data.totalTyped) || 0;
            const correct = (data && data.correctTyped) || 0;
            cumulativeTotalRef.current = total;
            cumulativeCorrectRef.current = correct;
            setCumulativeTotal(total);
            setCumulativeCorrect(correct);
          })
          .catch((err) => setAuthError(friendlyAuthError(err)));
      }
    });

    return () => unsubscribe();
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    setAuthError('');
    setResetSent(false);
    const email = emailInput.trim();
    if (!email || !passwordInput) return;
    firebase.auth().signInWithEmailAndPassword(email, passwordInput)
      .catch((err) => setAuthError(friendlyAuthError(err)));
  };

  const handleRegister = () => {
    setAuthError('');
    setResetSent(false);
    const email = emailInput.trim();
    if (!email || !passwordInput) return;
    firebase.auth().createUserWithEmailAndPassword(email, passwordInput)
      .catch((err) => setAuthError(friendlyAuthError(err)));
  };

  const handlePasswordReset = () => {
    setAuthError('');
    setResetSent(false);
    const email = emailInput.trim();
    if (!email) {
      setAuthError('パスワードを再設定するメールアドレスを入力してください。');
      return;
    }
    firebase.auth().sendPasswordResetEmail(email)
      .then(() => setResetSent(true))
      .catch((err) => setAuthError(friendlyAuthError(err)));
  };

  const handleLogout = () => {
    firebase.auth().signOut();
    setCumulativeTotal(0);
    setCumulativeCorrect(0);
  };

  const [quoteIndex, setQuoteIndex] = useState(() => Math.floor(Math.random() * quoteCount()));
  const [quoteInfo, setQuoteInfo] = useState(() => getQuoteUnits(quoteIndex));
  const [completedTexts, setCompletedTexts] = useState([]);
  const [unitIndex, setUnitIndex] = useState(0);
  const [typedOffset, setTypedOffset] = useState(0);
  const [candidates, setCandidates] = useState(() => quoteInfo.units[0]?.alternatives || []);
  const [wrongFlag, setWrongFlag] = useState(false);
  const [totalTyped, setTotalTyped] = useState(0);
  const [correctTyped, setCorrectTyped] = useState(0);
  const [showResult, setShowResult] = useState(false);

  const quoteIndexRef = useRef(quoteIndex);
  const quoteInfoRef = useRef(quoteInfo);
  const completedTextsRef = useRef(completedTexts);
  const unitIndexRef = useRef(unitIndex);
  const typedOffsetRef = useRef(typedOffset);
  const candidatesRef = useRef(candidates);
  const pendingCommitRef = useRef(null);
  const showResultRef = useRef(showResult);

  useEffect(() => { showResultRef.current = showResult; }, [showResult]);

  const advanceToNextQuote = useCallback(() => {
    const total = quoteCount();
    const nextIdx = pickNextIndex(quoteIndexRef.current, total);
    const nextInfo = getQuoteUnits(nextIdx);
    const firstCands = nextInfo.units[0]?.alternatives || [];

    quoteIndexRef.current = nextIdx;
    quoteInfoRef.current = nextInfo;
    completedTextsRef.current = [];
    unitIndexRef.current = 0;
    typedOffsetRef.current = 0;
    candidatesRef.current = firstCands;
    pendingCommitRef.current = null;

    setQuoteIndex(nextIdx);
    setQuoteInfo(nextInfo);
    setCompletedTexts([]);
    setUnitIndex(0);
    setTypedOffset(0);
    setCandidates(firstCands);
    setWrongFlag(false);
  }, []);

  // Commits a finished unit (e.g. "n" for ん) and moves on to the next unit.
  // Returns the new unit index, or null if the quote finished and a new one started.
  const commitUnit = useCallback((completedStr, uIdx, units) => {
    const newCompleted = completedTextsRef.current.concat([completedStr]);
    completedTextsRef.current = newCompleted;
    setCompletedTexts(newCompleted);

    const nextUnitIdx = uIdx + 1;
    unitIndexRef.current = nextUnitIdx;
    typedOffsetRef.current = 0;
    pendingCommitRef.current = null;
    setUnitIndex(nextUnitIdx);
    setTypedOffset(0);

    if (nextUnitIdx >= units.length) {
      advanceToNextQuote();
      return null;
    }
    const nextCands = units[nextUnitIdx].alternatives;
    candidatesRef.current = nextCands;
    setCandidates(nextCands);
    return nextUnitIdx;
  }, [advanceToNextQuote]);

  const handleKeyDown = useCallback((e) => {
    if (screenRef.current !== 'app') return;
    if (!authUserRef.current) return;
    if (showResultRef.current) return;
    if (e.isComposing || e.keyCode === 229) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length !== 1) return;

    e.preventDefault();

    const units = quoteInfoRef.current.units;
    let uIdx = unitIndexRef.current;
    if (uIdx >= units.length) return;

    const typed = e.key;
    let offset = typedOffsetRef.current;
    let cands = candidatesRef.current;
    let matching = cands.filter((c) => c[offset] === typed);

    // e.g. "ん" has alternatives ["n", "nn"]. If "n" was already a complete
    // match but "nn" is still possible, this key may actually belong to the
    // next unit (the shorter reading was intended). Commit the short reading
    // and retry this key against the next unit instead of flagging it wrong.
    if (matching.length === 0 && pendingCommitRef.current) {
      const nextUnitIdx = commitUnit(pendingCommitRef.current, uIdx, units);
      if (nextUnitIdx === null) return;
      uIdx = nextUnitIdx;
      offset = 0;
      cands = candidatesRef.current;
      matching = cands.filter((c) => c[offset] === typed);
    }

    setTotalTyped((t) => t + 1);

    if (matching.length === 0) {
      setWrongFlag(true);
      return;
    }

    setWrongFlag(false);
    setCorrectTyped((c) => c + 1);

    const newOffset = offset + 1;
    const exactMatches = matching.filter((c) => c.length === newOffset);
    const longerMatches = matching.filter((c) => c.length > newOffset);

    if (exactMatches.length > 0 && longerMatches.length > 0) {
      // Ambiguous (only ん: "n" done but "nn" still viable). Accept the short
      // reading now when nothing following can resolve it: at the last unit, or
      // before a な-row sound (e.g. 三年=さんねん typed "sannen", where the next
      // "n" belongs to ね). Otherwise keep "nn" alive as a pending commit.
      const isLast = uIdx + 1 >= units.length;
      const nextStartsN = !isLast && units[uIdx + 1].alternatives.every((a) => a[0] === 'n');
      if (isLast || nextStartsN) {
        commitUnit(exactMatches[0], uIdx, units);
      } else {
        pendingCommitRef.current = exactMatches[0];
        typedOffsetRef.current = newOffset;
        candidatesRef.current = matching;
        setTypedOffset(newOffset);
        setCandidates(matching);
      }
    } else if (exactMatches.length > 0) {
      commitUnit(exactMatches[0], uIdx, units);
    } else {
      pendingCommitRef.current = null;
      typedOffsetRef.current = newOffset;
      candidatesRef.current = matching;
      setTypedOffset(newOffset);
      setCandidates(matching);
    }
  }, [commitUnit]);

  useEffect(() => {
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [handleKeyDown]);

  const handleFinish = () => {
    setShowResult(true);
    const user = authUserRef.current;
    if (user) {
      const newTotal = cumulativeTotalRef.current + totalTyped;
      const newCorrect = cumulativeCorrectRef.current + correctTyped;
      cumulativeTotalRef.current = newTotal;
      cumulativeCorrectRef.current = newCorrect;
      setCumulativeTotal(newTotal);
      setCumulativeCorrect(newCorrect);
      firebase.firestore().collection('typingStats').doc(user.uid).set({
        totalTyped: newTotal,
        correctTyped: newCorrect,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }, { merge: true }).catch((err) => setAuthError(friendlyAuthError(err)));
    }
  };

  const startFresh = useCallback(() => {
    setTotalTyped(0);
    setCorrectTyped(0);
    setShowResult(false);
    quoteIndexRef.current = -1;
    advanceToNextQuote();
  }, [advanceToNextQuote]);

  const handleRestart = () => {
    startFresh();
  };

  const accuracy = totalTyped > 0 ? ((correctTyped / totalTyped) * 100).toFixed(1) : '0.0';

  const resolvedPrefix = completedTexts.join('');
  const currentUnit = quoteInfo.units[unitIndex];
  const preview = currentUnit ? (candidates[0] || '').slice(typedOffset) : '';
  const future = quoteInfo.units.slice(unitIndex + 1).map((u) => u.display).join('');
  const displayTarget = resolvedPrefix + preview + future;
  const currentPos = resolvedPrefix.length;

  if (screen === 'shooting') {
    return <ShootingGame onExit={() => setScreen('top')} />;
  }

  if (screen === 'top') {
    return (
      <div className="flex flex-col items-center">
        <h1 className="gothic-font text-4xl sm:text-6xl font-black text-[#3a2f1e] tracking-wide">
          無限タイピング
        </h1>
        <p className="typewriter-font text-xs text-[#8a7a56] mt-4 tracking-[0.3em]">ことわざタイピング</p>

        <div className="flex flex-col gap-4 mt-12 w-72">
          <button
            onClick={() => setScreen('app')}
            className="retro-btn px-10 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
          >
            はじめる
          </button>
          <button
            onClick={() => setScreen('shooting')}
            className="retro-btn px-10 py-3 bg-[#8a4b2f] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#743d26] active:scale-95 transition"
          >
            シューティングモード
          </button>
        </div>

        <div className="mt-8 text-center text-[11px] text-[#a89a78] typewriter-font leading-relaxed">
          <p>はじめる … ことわざを次々にタイピング</p>
          <p>シューティング … 落ちてくることわざを撃退</p>
        </div>
      </div>
    );
  }

  if (authLoading) {
    return (
      <div className="paper-card rounded-sm px-10 py-10 text-center">
        <p className="typewriter-font text-[#8a7a56]">読み込み中...</p>
      </div>
    );
  }

  if (!authUser) {
    return (
      <div className="relative w-full max-w-md">
        <div className="paper-card rounded-sm px-10 py-12 text-center">
          <h1 className="typewriter-font text-2xl text-[#3a2f1e] mb-2">無限タイピング</h1>
          <p className="text-xs text-[#8a7a56] mb-8 tracking-wide">メールアドレスとパスワードでログインしてください</p>

          <form onSubmit={handleLogin}>
            <input
              type="email"
              required
              value={emailInput}
              onChange={(e) => setEmailInput(e.target.value)}
              placeholder="you@example.com"
              className="typewriter-font w-full px-4 py-3 mb-4 rounded-sm border border-[#d9cba8] bg-[#faf5e9] text-[#3a2f1e] text-center focus:outline-none focus:border-[#8a7a56]"
            />
            <input
              type="password"
              required
              value={passwordInput}
              onChange={(e) => setPasswordInput(e.target.value)}
              placeholder="パスワード"
              className="typewriter-font w-full px-4 py-3 mb-4 rounded-sm border border-[#d9cba8] bg-[#faf5e9] text-[#3a2f1e] text-center focus:outline-none focus:border-[#8a7a56]"
            />
            <button
              type="submit"
              className="retro-btn w-full px-5 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
            >
              ログイン
            </button>
            <button
              type="button"
              onClick={handleRegister}
              className="retro-btn w-full mt-3 px-5 py-3 bg-transparent text-[#5c4a32] border border-[#5c4a32] tracking-wider hover:bg-[#5c4a32]/10 active:scale-95 transition"
            >
              新規登録
            </button>
          </form>

          <button
            type="button"
            onClick={handlePasswordReset}
            className="typewriter-font text-xs text-[#8a7a56] underline mt-6 hover:text-[#5c4a32] block mx-auto"
          >
            パスワードをお忘れですか？
          </button>

          <button
            onClick={() => setScreen('top')}
            className="typewriter-font text-xs text-[#8a7a56] underline mt-3 hover:text-[#5c4a32]"
          >
            トップに戻る
          </button>

          {resetSent && (
            <p className="text-xs text-[#2e5c3e] mt-4">
              パスワード再設定用のメールを送信しました。メール内のリンクから新しいパスワードを設定してください。
            </p>
          )}

          {authError && (
            <p className="text-xs text-[#a13d2e] mt-4">{authError}</p>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="relative w-full max-w-3xl">
      <div className="ink-stain w-64 h-64 -top-10 -left-16"></div>
      <div className="ink-stain w-72 h-72 -bottom-16 -right-10"></div>

      <div className="fixed top-5 left-1/2 -translate-x-1/2 z-20 text-xs text-[#8a7a56] typewriter-font flex items-center gap-3">
        <span>{authUser.email}</span>
        <button onClick={handleLogout} className="underline hover:text-[#5c4a32]">ログアウト</button>
      </div>

      <button
        onClick={() => setScreen('top')}
        className="retro-btn fixed top-5 left-5 z-20 px-5 py-2 bg-[#5c4a32] text-[#f4ecd8] text-sm tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
      >
        トップ
      </button>

      <button
        onClick={handleFinish}
        className="retro-btn fixed top-5 right-5 z-20 px-5 py-2 bg-[#5c4a32] text-[#f4ecd8] text-sm tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
      >
        終わり
      </button>

      <div className="paper-card relative rounded-sm px-8 py-14 sm:px-14 sm:py-16 min-h-[280px] sm:min-h-[340px] flex flex-col justify-center">
        <p className="text-center text-xs text-[#8a7a56] mb-8 tracking-[0.3em] uppercase typewriter-font">
          Endless Typing
        </p>

        {quoteInfo.reference && (
          <p className="mincho-font text-lg sm:text-xl text-center text-[#8a7a56] mb-[5mm] select-none break-words">
            <ruby>
              {quoteInfo.reference}
              <rt className="text-[10px] sm:text-xs text-[#a89a78] tracking-normal">{quoteInfo.reading}</rt>
            </ruby>
          </p>
        )}

        <p className="mincho-font text-xl sm:text-2xl leading-relaxed sm:leading-loose text-[#3a2f1e] select-none break-words text-center">
          {displayTarget.split('').map((ch, i) => {
            let cls = 'char-pending';
            if (i < currentPos) cls = 'char-correct';
            else if (i === currentPos) cls = wrongFlag ? 'char-current-wrong' : 'char-current';
            return (
              <span key={i} className={cls}>
                {ch === ' ' ? ' ' : ch}
              </span>
            );
          })}
        </p>

        {quoteInfo.note && (
          <p className="typewriter-font text-xs sm:text-sm text-center text-[#a89a78] mt-6 select-none break-words">
            {quoteInfo.note}
          </p>
        )}
      </div>

      <p className="text-center mt-6 text-[#8a7a56] text-xs typewriter-font tracking-wide">
        【終わり】を押すまで続きます
      </p>

      {showResult && (
        <div className="fixed inset-0 bg-[#2a2117]/60 flex items-center justify-center z-30 p-4">
          <div className="paper-card rounded-sm px-10 py-10 w-full max-w-sm text-center relative">
            <h2 className="typewriter-font text-2xl text-[#3a2f1e] mb-8 tracking-wide">Result</h2>

            <div className="mb-6">
              <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">総タイプ文字数</p>
              <p className="typewriter-font text-3xl text-[#3a2f1e]">{totalTyped}</p>
            </div>

            <div className="mb-6">
              <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">正誤率</p>
              <p className="typewriter-font text-3xl text-[#3a2f1e]">{accuracy}%</p>
            </div>

            <div className="mb-9 pt-4 border-t border-[#d9cba8]">
              <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">累計タイプ数(全端末合計)</p>
              <p className="typewriter-font text-2xl text-[#3a2f1e]">{cumulativeTotal}</p>
            </div>

            <button
              onClick={handleRestart}
              className="retro-btn w-full px-5 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
            >
              もう一度
            </button>

            <button
              onClick={() => setScreen('top')}
              className="retro-btn w-full mt-3 px-5 py-3 bg-transparent text-[#5c4a32] border border-[#5c4a32] tracking-wider hover:bg-[#5c4a32]/10 active:scale-95 transition"
            >
              トップに戻る
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
