  { text: "人生は自分が思うほど短くない", reading: "じんせいはじぶんがおもうほどみじかくない" },

  { text: "準備が成功の半分を決める", reading: "じゅんびがせいこうのはんぶんをきめる" },

  { text: "心の中の炎を消すな", reading: "こころのなかのほのおをけすな" },

  { text: "腐っても鯛", reading: "くさってもたい", note: "意味: 本当に価値のあるものは状態が悪くなってもそれなりの値打ちを保っているということ" },

  { text: "大魚は小池に棲まず", reading: "たいぎょはしょうちにすまず", note: "意味: 大人物は小さな場所には満足しないというたとえ" },
  { text: "竜頭蛇尾", reading: "りゅうとうだび", note: "意味: 始めは勢いが盛んだが終わりは振るわないこと" },
  { text: "蛇の生殺し", reading: "へびのなまごろし", note: "意味: 物事に決着をつけず中途半端な状態にしておくこと" },
  { text: "雉も鳴かずば撃たれまい", reading: "きじもなかずばうたれまい", note: "意味: 余計なことを言わなければ災いを招かずに済むということ" },
  { text: "能ある鷹は爪を隠す", reading: "のうあるたかはつめをかくす", note: "意味: 実力のある者はむやみにそれを誇示しないということ" },
  { text: "鳶が鷹を生む", reading: "とびがたかをうむ", note: "意味: 平凡な親から優れた子が生まれることのたとえ" },
  { text: "雀百まで踊り忘れず", reading: "すずめひゃくまでおどりわすれず", note: "意味: 若い時に身についた習慣は年をとっても直らないということ" },
  { text: "石が流れて木の葉が沈む", reading: "いしがながれてこのはがしずむ", note: "意味: 道理が逆転していて物事があべこべであることのたとえ" },
  { text: "好事魔多し", reading: "こうじまおおし", note: "意味: 良いことには邪魔が入りやすいということ" },
  { text: "禍福は糾える縄の如し", reading: "かふくはあざなえるなわのごとし", note: "意味: 幸福と不幸は縄をより合わせたように交互に訪れるということ" },
  { text: "一寸の光陰軽んずべからず", reading: "いっすんのこういんかろんずべからず", note: "意味: わずかな時間も無駄にしてはいけないという教え" },
  { text: "歳月人を待たず", reading: "さいげつひとをまたず", note: "意味: 月日は人の都合とは関係なく過ぎ去っていくということ" },
  { text: "会うは別れの始め", reading: "あうはわかれのはじめ", note: "意味: 出会った者はいつか必ず別れる運命にあるということ" },
  { text: "袖振り合うも多生の縁", reading: "そでふりあうもたしょうのえん", note: "意味: ちょっとした出会いも前世からの深い因縁によるものだということ" },
  { text: "恩を仇で返す", reading: "おんをあだでかえす", note: "意味: 受けた恩に対して逆に害を与えること" },
  { text: "立つ瀬がない", reading: "たつせがない", note: "意味: 面目を失いその場に居づらいこと" },
  { text: "顔から火が出る", reading: "かおからひがでる", note: "意味: 恥ずかしさで顔が赤くなるほど気まずいこと" },
  { text: "舌を巻く", reading: "したをまく", note: "意味: 非常に驚き感心すること" },
  { text: "耳が痛い", reading: "みみがいたい", note: "意味: 自分の弱点を指摘されてつらいこと" },
  { text: "耳を疑う", reading: "みみをうたがう", note: "意味: 聞いたことが信じられないほど意外であること" },
  { text: "口が滑る", reading: "くちがすべる", note: "意味: 言ってはいけないことをうっかり言ってしまうこと" },
  { text: "口が重い", reading: "くちがおもい", note: "意味: 口数が少なくあまり話さない性格のこと" },
  { text: "舌が回る", reading: "したがまわる", note: "意味: よどみなくすらすらと話すこと" },
  { text: "手も足も出ない", reading: "てもあしもでない", note: "意味: 自分の力ではどうにもできない状態のこと" },
  { text: "手に汗を握る", reading: "てにあせをにぎる", note: "意味: 緊迫した場面で興奮したり緊張したりすること" },
  { text: "腹が黒い", reading: "はらがくろい", note: "意味: 心の中に悪意を隠していること" },
  { text: "腹を割って話す", reading: "はらをわってはなす", note: "意味: 本心を隠さずに打ち明けて話すこと" },
  { text: "肩を落とす", reading: "かたをおとす", note: "意味: 気力を失いがっかりすること" },
  { text: "骨が折れる", reading: "ほねがおれる", note: "意味: 物事をするのに非常に苦労すること" },
  { text: "骨身を惜しまず", reading: "ほねみをおしまず", note: "意味: 苦労をいとわず一生懸命働くこと" },
  { text: "身を粉にする", reading: "みをこにする", note: "意味: 労力を惜しまず一生懸命働くこと" },
  { text: "手塩にかける", reading: "てしおにかける", note: "意味: 自分で世話をして大切に育てること" },
  { text: "一肌脱ぐ", reading: "ひとはだぬぐ", note: "意味: 人のために本気になって力を貸すこと" },
  { text: "頭が上がらない", reading: "あたまがあがらない", note: "意味: 相手に負い目があって対等な立場に立てないこと" },
  { text: "顔が広い", reading: "かおがひろい", note: "意味: 知り合いが多く社会的なつながりが豊富なこと" },
  { text: "顔に泥を塗る", reading: "かおにどろをぬる", note: "意味: 相手の名誉を傷つけ恥をかかせること" },
  { text: "板挟みになる", reading: "いたばさみになる", note: "意味: 対立する二つの間に立って苦しい立場になること" },
  { text: "猫の目のように変わる", reading: "ねこのめのようにかわる", note: "意味: 物事が非常に変わりやすいことのたとえ" },
  { text: "水と油", reading: "みずとあぶら", note: "意味: 性質が違っていて互いに溶け合わないもののたとえ" },
  { text: "氷炭相容れず", reading: "ひょうたんあいいれず", note: "意味: 性質が正反対で調和しないことのたとえ" },
  { text: "上手の手から水が漏る", reading: "じょうずのてからみずがもる", note: "意味: どんな名人でも時には失敗することがあるということ" },
  { text: "千慮の一失", reading: "せんりょのいっしつ", note: "意味: 賢い人でも多くの考えの中には一つくらい失敗があるということ" },
  { text: "踏んだり蹴ったり", reading: "ふんだりけったり", note: "意味: 続けて酷い目に遭うこと" },
  { text: "油断大敵", reading: "ゆだんたいてき", note: "意味: 油断は失敗のもとであり最も恐ろしい敵であるという戒め" },
  { text: "備えあれば憂いなし", reading: "そなえあればうれいなし", note: "意味: 普段から準備をしておけばいざという時に心配がないということ" },
  { text: "危ない橋を渡る", reading: "あぶないはしをわたる", note: "意味: 危険を承知のうえで物事を行うこと" },
  { text: "君子危うきに近寄らず", reading: "くんしあやうきにちかよらず", note: "意味: 教養と徳のある人は自らすすんで危険なことをしないということ" },
  { text: "寝た子を起こす", reading: "ねたこをおこす", note: "意味: 収まっている物事にわざわざ手を出して問題を再燃させること" },
  { text: "藪をつついて蛇を出す", reading: "やぶをつついてへびをだす", note: "意味: 余計なことをして自ら災いを招くこと" },
  { text: "寝耳に水", reading: "ねみみにみず", note: "意味: 突然の出来事に非常に驚くこと" },
  { text: "青天の霹靂", reading: "せいてんのへきれき", note: "意味: 突然起こる思いがけない大事件のたとえ" },
  { text: "明日は我が身", reading: "あすはわがみ", note: "意味: 他人の不幸も自分の身に起こるかもしれないということ" },
  { text: "人の振り見て我が振り直せ", reading: "ひとのふりみてわがふりなおせ", note: "意味: 他人の行いを見て自分の行いを反省し改めるべきだという教え" },
  { text: "他山の石", reading: "たざんのいし", note: "意味: 他人のつまらない言行も自分の修養の助けになるということ" },
  { text: "反面教師", reading: "はんめんきょうし", note: "意味: 悪い見本として、かえって教訓を与える存在" },
  { text: "隗より始めよ", reading: "かいよりはじめよ", note: "意味: 大事を成すにはまず手近なことから着手せよという教え" },
  { text: "一念岩をも通す", reading: "いちねんいわをもとおす", note: "意味: 強い意志を持って行えばどんな困難も成し遂げられるということ" },
  { text: "石に立つ矢", reading: "いしにたつや", note: "意味: 一心に努力すればどんな難事も成し遂げられるということ" },
  { text: "精神一到何事か成らざらん", reading: "せいしんいっとうなにごとかならざらん", note: "意味: 精神を集中して行えば成し遂げられないことはないという教え" },
  { text: "雨だれ石を穿つ", reading: "あまだれいしをうがつ", note: "意味: 小さな努力でも根気よく続ければ大きな成果を得られるということ" },
  { text: "好機は二度と来ない", reading: "こうきはにどとこない", note: "意味: チャンスは二度と巡ってこないから逃してはいけないという教え" },
  { text: "鉄は熱いうちに打て", reading: "てつはあついうちにうて", note: "意味: 物事は好機を逃さず時機を得て行うべきだという教え" },
  { text: "思い立ったが吉日", reading: "おもいたったがきちじつ", note: "意味: 何かをしようと思い立ったらすぐに実行するのがよいということ" },
  { text: "善は急げ", reading: "ぜんはいそげ", note: "意味: 良いと思ったことはためらわずすぐに実行せよという教え" },
  { text: "木に縁りて魚を求む", reading: "きによりてうおをもとむ", note: "意味: 方法を誤ると目的を達成できないことのたとえ" },
  { text: "画竜点睛を欠く", reading: "がりょうてんせいをかく", note: "意味: 物事の最後の仕上げが不十分で全体が引き立たないこと" },
  { text: "大山鳴動して鼠一匹", reading: "たいざんめいどうしてねずみいっぴき", note: "意味: 大騒ぎした割に結果がとても小さいことのたとえ" },
  { text: "羹に懲りて膾を吹く", reading: "あつものにこりてなますをふく", note: "意味: 一度の失敗に懲りて必要以上に用心深くなることのたとえ" },
  { text: "前車の轍を踏む", reading: "ぜんしゃのてつをふむ", note: "意味: 前の人と同じ失敗を繰り返すことのたとえ" },
  { text: "蟷螂の斧", reading: "とうろうのおの", note: "意味: 弱者が自分の力量を顧みず強者に立ち向かうことのたとえ" },
  { text: "呉越同舟", reading: "ごえつどうしゅう", note: "意味: 仲の悪い者同士が同じ場所や境遇に居合わせること" },
  { text: "漁夫の利", reading: "ぎょふのり", note: "意味: 両者が争っている隙に第三者が利益を横取りすること" },
  { text: "杞憂", reading: "きゆう", note: "意味: 将来のことについて余計な心配をすること" },
  { text: "矛盾", reading: "むじゅん", note: "意味: 話や物事のつじつまが合わないこと" },
  { text: "五十歩百歩", reading: "ごじっぽひゃっぽ", note: "意味: 少しの違いはあっても本質的には同じであることのたとえ" },
  { text: "完璧", reading: "かんぺき", note: "意味: 欠点が全くなく完全であること" },
  { text: "四面楚歌", reading: "しめんそか", note: "意味: 周囲を敵に囲まれて孤立無援であること" },
  { text: "背水の陣", reading: "はいすいのじん", note: "意味: 逃げ場をなくして必死の覚悟で事にあたること" },
  { text: "臥薪嘗胆", reading: "がしんしょうたん", note: "意味: 目的を達成するために苦労を重ね我慢すること" },
  { text: "蛍雪の功", reading: "けいせつのこう", note: "意味: 苦労して勉学に励んだ成果" },
  { text: "三顧の礼", reading: "さんこのれい", note: "意味: 目上の人が礼を尽くして人材を招くこと" },
  { text: "水魚の交わり", reading: "すいぎょのまじわり", note: "意味: 極めて親密で切っても切れない関係のたとえ" },
  { text: "断腸の思い", reading: "だんちょうのおもい", note: "意味: 腸がちぎれるほどのつらく悲しい思い" },
  { text: "杜撰", reading: "ずさん", note: "意味: 物事のやり方がいい加減で誤りが多いこと" },
  { text: "推敲", reading: "すいこう", note: "意味: 詩や文章の字句を何度も練り直すこと" },
  { text: "玉磨かざれば光なし", reading: "たまみがかざればひかりなし", note: "意味: どんなに素質があっても学び磨かなければ立派にはならないという教え" },
  { text: "学問に王道なし", reading: "がくもんにおうどうなし", note: "意味: 学問を修めるのに簡単な近道はないということ" },
  { text: "千里の馬も一日にしては至らず", reading: "せんりのうまもいちにちにしてはいたらず", note: "意味: 大事業も着実な努力を積み重ねなければ成し遂げられないということ" },
  { text: "桃李物言わざれど下自ら蹊を成す", reading: "とうりものいわざれどしたおのずからみちをなす", note: "意味: 徳のある人は自然と人が慕い集まるということ" },
  { text: "忠言耳に逆らう", reading: "ちゅうげんみみにさからう", note: "意味: 自分のためになる忠告ほど素直に聞き入れがたいものだということ" },
  { text: "吾輩は猫である。名前はまだない。", reading: "わがはいはねこであるなまえはまだない", note: "夏目漱石『吾輩は猫である』" },
  { text: "智に働けば角が立つ、情に棹させば流される、意地を通せば窮屈だ。とかくに人の世は住みにくい。", reading: "ちにはたらけばかどがたつじょうにさおさせばながされるいじをとおせばきゅうくつだとかくにひとのよはすみにくい", note: "夏目漱石『草枕』" },
  { text: "私はその人を常に先生と呼んでいた。", reading: "わたしはそのひとをつねにせんせいとよんでいた", note: "夏目漱石『こころ』" },
  { text: "親譲りの無鉄砲で子供の時から損ばかりしている。", reading: "おやゆずりのむてっぽうでこどものときからそんばかりしている", note: "夏目漱石『坊っちゃん』" },
  { text: "恥の多い生涯を送って来ました。", reading: "はじのおおいしょうがいをおくってきました", note: "太宰治『人間失格』" },
  { text: "自分には、人間の生活というものが、見当つかないのです。", reading: "じぶんにはにんげんのせいかつというものがけんとうつかないのです", note: "太宰治『人間失格』" },
  { text: "恋と革命のために生れて来た。", reading: "こいとかくめいのためにうまれてきた", note: "太宰治『斜陽』" },
  { text: "メロスは激怒した。", reading: "めろすはげきどした", note: "太宰治『走れメロス』" },
  { text: "雨にも負けず風にも負けず", reading: "あめにもまけずかぜにもまけず", note: "宮沢賢治『雨ニモマケズ』" },
  { text: "ほんとうのさいわいは一体何だろう", reading: "ほんとうのさいわいはいったいなんだろう", note: "宮沢賢治『銀河鉄道の夜』(ジョバンニ)" },
  { text: "世界がぜんたい幸福にならないうちは個人の幸福はあり得ない", reading: "せかいがぜんたいこうふくにならないうちはこじんのこうふくはありえない", note: "宮沢賢治『農民芸術概論綱要』" },
  { text: "下人の行方は、誰も知らない。", reading: "げにんのゆくえはだれもしらない", note: "芥川龍之介『羅生門』" },
  { text: "蜘蛛の糸はぷつりと切れました。", reading: "くものいとはぷつりときれました", note: "芥川龍之介『蜘蛛の糸』" },
  { text: "臆病な自尊心と尊大な羞恥心", reading: "おくびょうなじそんしんとそんだいなしゅうちしん", note: "中島敦『山月記』" },
  { text: "国境の長いトンネルを抜けると雪国であった。", reading: "こっきょうのながいとんねるをぬけるとゆきぐにであった", note: "川端康成『雪国』" },
  { text: "はたらけどはたらけど猶わが生活楽にならざりぢっと手を見る", reading: "はたらけどはたらけどなおわがくらしらくにならざりじっとてをみる", note: "石川啄木『一握の砂』" },
  { text: "分け入っても分け入っても青い山", reading: "わけいってもわけいってもあおいやま", note: "種田山頭火" },
  { text: "高瀬舟は京都の高瀬川を上下する小舟である。", reading: "たかせぶねはきょうとのたかせがわをじょうげするこぶねである", note: "森鷗外『高瀬舟』" },
  { text: "為せば成る為さねば成らぬ何事も成らぬは人の為さぬなりけり", reading: "なせばなるなさねばならぬなにごともならぬはひとのなさぬなりけり", note: "上杉鷹山" },
  { text: "世の人は我を何とも言わば言え我がなすことは我のみぞ知る", reading: "よのひとはわれをなんともいわばいえわがなすことはわれのみぞしる", note: "坂本龍馬" },
  { text: "至誠にして動かざる者は未だこれあらざるなり", reading: "しせいにしてうごかざるものはいまだこれあらざるなり", note: "吉田松陰" },
  { text: "天は人の上に人を造らず人の下に人を造らずと言えり", reading: "てんはひとのうえにひとをつくらずひとのしたにひとをつくらずといえり", note: "福沢諭吉『学問のすゝめ』" },
  { text: "千日の稽古を鍛とし、万日の稽古を練とす", reading: "せんにちのけいこをたんとしまんにちのけいこをれんとす", note: "宮本武蔵『五輪書』" },
  { text: "人の一生は重荷を負うて遠き道を行くが如し", reading: "ひとのいっしょうはおもにをおうてとおきみちをいくがごとし", note: "徳川家康" },
  { text: "人間五十年、下天のうちを比ぶれば、夢幻の如くなり", reading: "にんげんごじゅうねんげてんのうちをくらぶればゆめまぼろしのごとくなり", note: "織田信長(敦盛)" },
  { text: "人は城人は石垣人は堀情けは味方仇は敵なり", reading: "ひとはしろひとはいしがきひとはほりなさけはみかたあだはてきなり", note: "武田信玄" },
  { text: "雨が降れば傘をさす、それでいいじゃないか", reading: "あめがふればかさをさすそれでいいじゃないか", note: "松下幸之助" },
  { text: "誰にも負けない努力をする", reading: "だれにもまけないどりょくをする", note: "稲盛和夫" },
  { text: "論語と算盤は一致すべきものである", reading: "ろんごとそろばんはいっちすべきものである", note: "渋沢栄一『論語と算盤』" },
  { text: "古池や蛙飛び込む水の音", reading: "ふるいけやかわずとびこむみずのおと", note: "松尾芭蕉" },
  { text: "旅に病んで夢は枯野をかけ廻る", reading: "たびにやんでゆめはかれのをかけめぐる", note: "松尾芭蕉" },
  { text: "散る桜残る桜も散る桜", reading: "ちるさくらのこるさくらもちるさくら", note: "良寛" },
  { text: "芸術は爆発だ", reading: "げいじゅつはばくはつだ", note: "岡本太郎" },
  { text: "誰かがやらねばならぬ、私がやらねば誰がやる", reading: "だれかがやらねばならぬわたしがやらねばだれがやる", note: "野口英世" },
  { text: "小さいことを積み重ねるのが、とんでもないところに行くただひとつの道だと思っている", reading: "ちいさいことをつみかさねるのがとんでもないところにいくただひとつのみちだとおもっている", note: "イチロー" },
  { text: "努力は必ず報われる。もし報われない努力があるのならば、それはまだ努力と呼べない", reading: "どりょくはかならずむくわれるもしむくわれないどりょくがあるのならばそれはまだどりょくとよべない", note: "王貞治" },
  { text: "才能とは、継続できる情熱である", reading: "さいのうとはけいぞくできるじょうねつである", note: "羽生善治" },
  { text: "過ちて改めざる、是を過ちという", reading: "あやまちてあらためざるこれをあやまちという", note: "孔子『論語』" },
  { text: "己の欲せざる所は人に施すことなかれ", reading: "おのれのほっせざるところはひとにほどこすことなかれ", note: "孔子『論語』" },
  { text: "三人行えば必ず我が師あり", reading: "さんにんおこなえばかならずわがしあり", note: "孔子『論語』" },
  { text: "学びて時にこれを習う、亦説ばしからずや", reading: "まなびてときにこれをならうまたよろこばしからずや", note: "孔子『論語』" },
  { text: "十有五にして学に志す", reading: "じゅうゆうごにしてがくにこころざす", note: "孔子『論語』" },
  { text: "天の時は地の利に如かず、地の利は人の和に如かず", reading: "てんのときはちのりにしかずちのりはひとのわにしかず", note: "孟子" },
  { text: "道徳を忘れた経済は罪悪である", reading: "どうとくをわすれたけいざいはざいあくである", note: "二宮尊徳" },
  { text: "敬天愛人", reading: "けいてんあいじん", note: "西郷隆盛" },
  { text: "世間が許さないのではない、あなたが許さないのでしょう", reading: "せけんがゆるさないのではないあなたがゆるさないのでしょう", note: "太宰治『人間失格』" },
  { text: "ここからはじめましょう。一から、いいえ、ゼロから。", reading: "ここからはじめましょういちからいいえぜろから", note: "Re:ゼロから始める異世界生活" },
  { text: "河童に水練", reading: "かっぱにすいれん", note: "意味: 知り尽くしている人にその道のことを教える愚かさのたとえ" },
  { text: "釈迦に説法", reading: "しゃかにせっぽう", note: "意味: その道をよく知っている人に対して教えを説く愚かさのたとえ" },
  { text: "馬耳東風", reading: "ばじとうふう", note: "意味: 人の意見や忠告を心にとめず聞き流すこと" },
  { text: "対岸の火事", reading: "たいがんのかじ", note: "意味: 自分には関係がなく痛痒を感じないことのたとえ" },
  { text: "高みの見物", reading: "たかみのけんぶつ", note: "意味: 自分は関係ない立場から物事の成り行きを眺めること" },
  { text: "火に油を注ぐ", reading: "ひにあぶらをそそぐ", note: "意味: 勢いのあるものにさらに勢いを加えることのたとえ" },
  { text: "飛んで火に入る夏の虫", reading: "とんでひにいるなつのむし", note: "意味: 自ら進んで危険や災難に飛び込むことのたとえ" },
  { text: "水に流す", reading: "みずにながす", note: "意味: 過去のいざこざをなかったことにすること" },
  { text: "一石を投じる", reading: "いっせきをとうじる", note: "意味: 反響を呼ぶような問題を投げかけること" },
  { text: "一日の長", reading: "いちじつのちょう", note: "意味: 経験や知識が他よりわずかに優れていること" },
  { text: "瓜の蔓に茄子はならぬ", reading: "うりのつるになすびはならぬ", note: "意味: 平凡な親から非凡な子は生まれないというたとえ" },
  { text: "蛙は口ゆえ蛇に呑まるる", reading: "かえるはくちゆえへびにのまるる", note: "意味: 余計なことを言ったために災いを招くことのたとえ" },
  { text: "口は禍の門", reading: "くちはわざわいのかど", note: "意味: 不用意な発言は災いを招くもとになるという戒め" },
  { text: "沈黙は金雄弁は銀", reading: "ちんもくはきんゆうべんはぎん", note: "意味: 多くを語らないことは雄弁であることよりも価値があるということ" },
  { text: "言わぬが花", reading: "いわぬがはな", note: "意味: はっきり言わない方が趣があり奥ゆかしいということ" },
  { text: "不言実行", reading: "ふげんじっこう", note: "意味: あれこれ言わず黙って実行すること" },
  { text: "百戦錬磨", reading: "ひゃくせんれんま", note: "意味: 多くの経験を積んで鍛えられていること" },
  { text: "一騎当千", reading: "いっきとうせん", note: "意味: 一人で千人の敵に対抗できるほど強く優れていること" },
  { text: "満身創痍", reading: "まんしんそうい", note: "意味: 体中傷だらけであること、また非常に疲れ果てた状態のたとえ" },
  { text: "疾風迅雷", reading: "しっぷうじんらい", note: "意味: 行動が非常に素早く激しいことのたとえ" },
  { text: "一触即発", reading: "いっしょくそくはつ", note: "意味: ちょっとしたきっかけで大事が起こりそうな緊迫した状態" },
  { text: "危機一髪", reading: "ききいっぱつ", note: "意味: 髪の毛一本ほどの差で危険が迫っている状態" },
  { text: "起承転結", reading: "きしょうてんけつ", note: "意味: 物事の展開や文章の構成の型" },
  { text: "出藍の誉れ", reading: "しゅつらんのほまれ", note: "意味: 弟子が師よりも優れた才能を発揮すること" },
  { text: "青は藍より出でて藍より青し", reading: "あおはあいよりいでてあいよりあおし", note: "意味: 弟子が師よりも優れることのたとえ" },
  { text: "千丈の堤も蟻の穴から", reading: "せんじょうのつつみもありのあなから", note: "意味: ほんの小さな油断が大きな失敗を招くことのたとえ" },
  { text: "桃栗三年柿八年", reading: "ももくりさんねんかきはちねん", note: "意味: 何事も成果を得るには相応の年月が必要だということ" },
  { text: "十年一昔", reading: "じゅうねんひとむかし", note: "意味: 十年も経てば世の中はすっかり変わってしまうということ" },
  { text: "一年の計は元旦にあり", reading: "いちねんのけいはがんたんにあり", note: "意味: 何事も最初にしっかり計画を立てることが大切だということ" },
  { text: "九仞の功を一簣に虧く", reading: "きゅうじんのこうをいっきにかく", note: "意味: 長い間の苦労も最後のわずかな油断で無駄にしてしまうことのたとえ" },
  { text: "詰めが甘い", reading: "つめがあまい", note: "意味: 物事の最後の仕上げが不十分であること" },
  { text: "有終の美", reading: "ゆうしゅうのび", note: "意味: 物事を最後までやり遂げて立派な成果を残すこと" },
  { text: "完全無欠", reading: "かんぜんむけつ", note: "意味: 欠点が全くなく完全であること" },
  { text: "前人未到", reading: "ぜんじんみとう", note: "意味: これまで誰も到達したことがないこと" },
  { text: "唯一無二", reading: "ゆいいつむに", note: "意味: ただ一つだけで他に代わりがないこと" },
  { text: "一世一代", reading: "いっせいちだい", note: "意味: 一生に一度だけの重大なこと" },
  { text: "一日千秋", reading: "いちじつせんしゅう", note: "意味: 非常に待ち遠しく思うことのたとえ" },
  { text: "首を長くする", reading: "くびをながくする", note: "意味: 期待して待ちわびること" },
  { text: "果報は寝て待て", reading: "かほうはねてまて", note: "意味: 幸運は焦らず自然にやってくるのを待つのがよいということ" },
  { text: "人事を尽くして天命を待つ", reading: "じんじをつくしててんめいをまつ", note: "意味: 全力を尽くしたら後の結果は天に任せるしかないということ" },
  { text: "労多くして功少なし", reading: "ろうおおくしてこうすくなし", note: "意味: 苦労ばかり多くて成果が少ないことのたとえ" },
  { text: "大巧は拙なるが若し", reading: "たいこうはせつなるがごとし", note: "意味: 本当に優れた技量を持つ人はかえって不器用に見えるということ" },
  { text: "弘法筆を選ばず", reading: "こうぼうふでをえらばず", note: "意味: 本当の名人は道具の良し悪しに左右されず立派な仕事をするということ" },
  { text: "芸は身を助く", reading: "げいはみをたすく", note: "意味: 身につけた芸事や技能がいざという時に生計の助けになるということ" },
  { text: "一芸は道に通ずる", reading: "いちげいはみちにつうずる", note: "意味: 一つの芸を極めれば他の道にも通じる普遍的な真理を得るということ" },
  { text: "下手の横好き", reading: "へたのよこずき", note: "意味: 上手ではないのに、そのことが非常に好きで熱心に行うこと" },
  { text: "虻蜂取らず", reading: "あぶはちとらず", note: "意味: 欲張って両方とも取ろうとして結局どちらも得られないことのたとえ" },
  { text: "一挙両得", reading: "いっきょりょうとく", note: "意味: 一つの行動で二つの利益を得ることのたとえ" },
  { text: "三者三様", reading: "さんしゃさんよう", note: "意味: 三人いれば三人それぞれのやり方や考え方があるということ" },
  { text: "千差万別", reading: "せんさばんべつ", note: "意味: 物事にはそれぞれ違いがあり同じものは一つもないということ" },
  { text: "十把一絡げ", reading: "じっぱひとからげ", note: "意味: 種類や質を問わず全て一まとめに扱うこと" },
  { text: "玉石混淆", reading: "ぎょくせきこんこう", note: "意味: 優れたものと劣ったものが入り混じっていること" },
  { text: "有象無象", reading: "うぞうむぞう", note: "意味: くだらないものや取るに足らない人々のこと" },
  { text: "同床異夢", reading: "どうしょういむ", note: "意味: 一緒に行動していても考えや目的が異なっていること" },
  { text: "表裏一体", reading: "ひょうりいったい", note: "意味: 二つの物事が切り離せない密接な関係にあること" },
  { text: "一心同体", reading: "いっしんどうたい", note: "意味: 二人以上の人が心を一つにして固く結びついていること" },
  { text: "阿吽の呼吸", reading: "あうんのこきゅう", note: "意味: 二人以上の人が息をぴったり合わせて物事を行うこと" },
  { text: "以心伝心", reading: "いしんでんしん", note: "意味: 言葉にしなくても互いの心が通じ合うこと" },
  { text: "単純明快", reading: "たんじゅんめいかい", note: "意味: 物事が非常に分かりやすくはっきりしていること" },
  { text: "心機一転", reading: "しんきいってん", note: "意味: あることをきっかけに気持ちがすっかり変わること" },
  { text: "一意専心", reading: "いちいせんしん", note: "意味: 心を一つのことに集中して打ち込むこと" },
  { text: "全身全霊", reading: "ぜんしんぜんれい", note: "意味: 体力と精神力の全て" },
  { text: "粉骨砕身", reading: "ふんこつさいしん", note: "意味: 力の限り努力すること" },
  { text: "悪戦苦闘", reading: "あくせんくとう", note: "意味: 苦しい状況の中で必死に努力すること" },
  { text: "七転八倒", reading: "しちてんばっとう", note: "意味: 苦痛のあまり転げ回ってもがき苦しむこと" },
  { text: "捲土重来", reading: "けんどちょうらい", note: "意味: 一度敗れた者が勢いを盛り返して再挑戦すること" },
  { text: "一念発起", reading: "いちねんほっき", note: "意味: あることを成し遂げようと決意すること" },
  { text: "初志貫徹", reading: "しょしかんてつ", note: "意味: 最初に思い立った志を最後まで貫き通すこと" },
  { text: "不撓不屈", reading: "ふとうふくつ", note: "意味: どんな困難にあってもくじけないこと" },
  { text: "堅忍不抜", reading: "けんにんふばつ", note: "意味: 心を堅く保ち何事にも動じないこと" },
  { text: "前途洋々", reading: "ぜんとようよう", note: "意味: 将来の見通しが明るく開けていること" },
  { text: "前途多難", reading: "ぜんとたなん", note: "意味: これから先、困難なことが多く待ち受けていること" },
  { text: "暗中模索", reading: "あんちゅうもさく", note: "意味: 手がかりのないまま、あれこれと試みること" },
  { text: "こんな夢を見た。", reading: "こんなゆめをみた", note: "夏目漱石『夢十夜』" },
  { text: "人間、失格。", reading: "にんげんしっかく", note: "太宰治『人間失格』" },
  { text: "禅智内供の鼻と云えば、池の尾で知らない者はない。", reading: "ぜんちないぐのはなといえばいけのおでしらないものはない", note: "芥川龍之介『鼻』" },
  { text: "二人の若い紳士が、すっかりイギリスの兵隊のかたちをして", reading: "ふたりのわかいしんしがすっかりいぎりすのへいたいのかたちをして", note: "宮沢賢治『注文の多い料理店』" },
  { text: "どっどどどうどどうどどうどどどう", reading: "どっどどどうどどうどどうどどどう", note: "宮沢賢治『風の又三郎』" },
  { text: "道がつづら折りになって、いよいよ天城峠に近づいたと思う頃", reading: "みちがつづらおりになっていよいよあまぎとうげにちかづいたとおもうころ", note: "川端康成『伊豆の踊子』" },
  { text: "ふるさとの訛なつかし停車場の人ごみの中にそを聴きにゆく", reading: "ふるさとのなまりなつかしていしゃばのひとごみのなかにそをききにゆく", note: "石川啄木『一握の砂』" },
  { text: "たわむれに母を背負いてそのあまり軽きに泣きて三歩あゆまず", reading: "たわむれにははをおぶいてそのあまりかろきになきてさんぽあゆまず", note: "石川啄木『一握の砂』" },
  { text: "露と落ち露と消えにしわが身かな浪速のことは夢のまた夢", reading: "つゆとおちつゆときえにしわがみかななにわのことはゆめのまたゆめ", note: "豊臣秀吉" },
  { text: "運は天にあり鎧は胸にあり手柄は足にあり", reading: "うんはてんにありよろいはむねにありてがらはあしにあり", note: "上杉謙信" },
  { text: "曇りなき心の月を先立てて浮世の闇を照らしてぞ行く", reading: "くもりなきこころのつきをさきだててうきよのやみをてらしてぞゆく", note: "伊達政宗" },
  { text: "怒りは敵と思え", reading: "いかりはてきとおもえ", note: "徳川家康" },
  { text: "おもしろき事もなき世をおもしろく", reading: "おもしろきこともなきよをおもしろく", note: "高杉晋作" },
  { text: "過ぎたるは猶及ばざるが如し", reading: "すぎたるはなおおよばざるがごとし", note: "孔子『論語』" },
  { text: "君子は和して同ぜず、小人は同じて和せず", reading: "くんしはわしてどうぜずしょうじんはどうじてわせず", note: "孔子『論語』" },
  { text: "知らざるを知らずと為す是知るなり", reading: "しらざるをしらずとなすこれしるなり", note: "孔子『論語』" },
  { text: "徳は孤ならず必ず隣あり", reading: "とくはこならずかならずとなりあり", note: "孔子『論語』" },
  { text: "リスクを取らないことが最大のリスクだ", reading: "りすくをとらないことがさいだいのりすくだ", note: "羽生善治" },
  { text: "つれづれなるままに、日暮らし、硯にむかひて", reading: "つれづれなるままにひぐらしすずりにむかいて", note: "兼好法師『徒然草』" },
  { text: "ゆく河の流れは絶えずして、しかも、もとの水にあらず。", reading: "ゆくかわのながれはたえずしてしかももとのみずにあらず", note: "鴨長明『方丈記』" },
  { text: "閑さや岩にしみ入る蝉の声", reading: "しずかさやいわにしみいるせみのこえ", note: "松尾芭蕉" },
  { text: "夏草や兵どもが夢の跡", reading: "なつくさやつわものどもがゆめのあと", note: "松尾芭蕉" },
  { text: "五月雨をあつめて早し最上川", reading: "さみだれをあつめてはやしもがみがわ", note: "松尾芭蕉" },
  { text: "菜の花や月は東に日は西に", reading: "なのはなやつきはひがしにひはにしに", note: "与謝蕪村" },
  { text: "痩蛙負けるな一茶これにあり", reading: "やせがえるまけるないっさこれにあり", note: "小林一茶" },
  { text: "雀の子そこのけそこのけお馬が通る", reading: "すずめのこそこのけそこのけおうまがとおる", note: "小林一茶" },
  { text: "朝に道を聞かば夕べに死すとも可なり", reading: "あさにみちをきかばゆうべにしすともかなり", note: "孔子『論語』" },
  { text: "義を見てせざるは勇無きなり", reading: "ぎをみてせざるはゆうなきなり", note: "孔子『論語』" },
  { text: "故きを温ねて新しきを知る", reading: "ふるきをたずねてあたらしきをしる", note: "孔子『論語』" },
  { text: "彼を知り己を知れば百戦殆うからず", reading: "かれをしりおのれをしればひゃくせんあやうからず", note: "孫子『孫子』" },
  { text: "武士道は、その表徴である桜花と同じく、日本の土地に固有の花である。", reading: "ぶしどうはそのひょうちょうであるおうかとおなじくにほんのとちにこゆうのはなである", note: "新渡戸稲造『武士道』" },
  { text: "人生は一箱のマッチに似ている。重大に扱うのはばかばかしい。重大に扱わなければ危険である。", reading: "じんせいはいちはこのまっちににているじゅうだいにあつかうのはばかばかしいじゅうだいにあつかわなければきけんである", note: "芥川龍之介『侏儒の言葉』" },
  { text: "秋の日は釣瓶落とし", reading: "あきのひはつるべおとし", note: "意味: 秋の日暮れは非常に早いことのたとえ" },
  { text: "一富士二鷹三茄子", reading: "いちふじにたかさんなすび", note: "意味: 初夢に見ると縁起が良いとされるものの順序" },
  { text: "冬来たりなば春遠からじ", reading: "ふゆきたりなばはるとおからじ", note: "意味: つらい時期を耐えれば必ず良い時が来るということ" },
  { text: "花は根に鳥は古巣に", reading: "はなはねにとりはふるすに", note: "意味: 物事はすべて元の状態に戻るというたとえ" },
  { text: "桜切る馬鹿梅切らぬ馬鹿", reading: "さくらきるばかうめきらぬばか", note: "意味: 木の性質に応じた手入れをすべきだという教え" },
  { text: "金は天下の回り物", reading: "かねはてんかのまわりもの", note: "意味: お金は一つの所にとどまらず、世の中を巡っていくものだということ" },
  { text: "安物買いの銭失い", reading: "やすものがいのぜにうしない", note: "意味: 安価なものは品質が悪くかえって損をするということ" },
  { text: "損して得取れ", reading: "そんしてとくとれ", note: "意味: 目先の損を気にせず先の大きな利益を見据えて行動せよという教え" },
  { text: "一銭を笑う者は一銭に泣く", reading: "いっせんをわらうものはいっせんになく", note: "意味: わずかなお金でも粗末にする者はそのわずかなお金で苦労するということ" },
  { text: "親の心子知らず", reading: "おやのこころこしらず", note: "意味: 親が子を思う深い気持ちを子どもはなかなか理解できないということ" },
  { text: "子は鎹", reading: "こはかすがい", note: "意味: 子どもの存在が夫婦の仲をつなぎとめる役割を果たすということ" },
  { text: "一姫二太郎", reading: "いちひめにたろう", note: "意味: 子育ては最初が女の子、次が男の子の順だと育てやすいということ" },
  { text: "可愛い子には旅をさせよ", reading: "かわいいこにはたびをさせよ", note: "意味: 子どもを甘やかさず、あえて苦労を経験させたほうがよいという教え" },
  { text: "紺屋の白袴", reading: "こうやのしろばかま", note: "意味: 他人のためには忙しく働くが自分自身のことは疎かにしがちであるということ" },
  { text: "遠くの親戚より近くの他人", reading: "とおくのしんせきよりちかくのたにん", note: "意味: いざという時には遠い親戚よりも近くにいる他人の方が頼りになるということ" },
  { text: "類は友を呼ぶ", reading: "るいはともをよぶ", note: "意味: 似た者同士は自然と集まり親しくなるということ" },
  { text: "朱に交われば赤くなる", reading: "しゅにまじわればあかくなる", note: "意味: 人は付き合う相手や環境に影響されて感化されるということ" },
  { text: "三日天下", reading: "みっかてんか", note: "意味: 権力や地位を得てもごく短期間しか続かないことのたとえ" },
  { text: "泥仕合", reading: "どろじあい", note: "意味: 互いに相手の欠点や恥を暴き合う醜い争いのこと" },
  { text: "内弁慶", reading: "うちべんけい", note: "意味: 家の中では威張るが外では気が弱くなる人のこと" },
  { text: "生き馬の目を抜く", reading: "いきうまのめをぬく", note: "意味: 油断もすきもならないほど素早く抜け目なく物事をすることのたとえ" },
  { text: "商いは牛の涎", reading: "あきないはうしのよだれ", note: "意味: 商売は牛の涎のように気長に辛抱強く続けることが大事だということ" },
  { text: "三方よし", reading: "さんぽうよし", note: "意味: 売り手・買い手・世間の三者すべてに利益があるのが良い商売だという近江商人の心得" },
  { text: "士は己を知る者の為に死す", reading: "しはおのれをしるもののためにしす" },
  { text: "少年老い易く学成り難し", reading: "しょうねんおいやすくがくなりがたし" },
  { text: "天知る地知る我知る人知る", reading: "てんしるちしるわれしるひとしる" },
  { text: "人間到る処青山あり", reading: "じんかんいたるところせいざんあり" },
  { text: "会者定離", reading: "えしゃじょうり" },
  { text: "一切皆苦", reading: "いっさいかいく" },
  { text: "色即是空空即是色", reading: "しきそくぜくうくうそくぜしき" },
  { text: "生者必滅会者定離", reading: "しょうじゃひつめつえしゃじょうり" },
  { text: "やってみせ、言って聞かせて、させてみせ、ほめてやらねば、人は動かじ", reading: "やってみせいってきかせてさせてみせほめてやらねばひとはうごかじ" },
  { text: "独立自尊", reading: "どくりつじそん" },
  { text: "柿くへば鐘が鳴るなり法隆寺", reading: "かきくえばかねがなるなりほうりゅうじ" },
  { text: "いくたびも雪の深さを尋ねけり", reading: "いくたびもゆきのふかさをたずねけり" },
  { text: "去年今年貫く棒の如きもの", reading: "こぞことしつらぬくぼうのごときもの" },
  { text: "白鳥は哀しからずや空の青海のあおにも染まずただよう", reading: "しらとりはかなしからずやそらのあおうみのあおにもそまずただよう" },
  { text: "山の動く日来る", reading: "やまのうごくひくる" },
  { text: "よだかは、実にみにくい鳥です。", reading: "よだかはじつにみにくいとりです" },
  { text: "小田原熱海間に、軽便鉄道敷設の工事が始まったのは、良平の八つの年だった。", reading: "おだわらあたみかんにけいべんてつどうふせつのこうじがはじまったのはりょうへいのやっつのとしだった" },
  { text: "或曇った冬の日暮れである。", reading: "あるくもったふゆのひぐれである" },
  { text: "仲良きことは美しき哉", reading: "なかよきことはうつくしきかな" },
  { text: "学びて厭わず人を誨えて倦まず", reading: "まなびていとわずひとをおしえてうまず" },
  { text: "君子は義に喩り、小人は利に喩る", reading: "くんしはぎにさとりしょうじんはりにさとる" },
  { text: "剛毅木訥仁に近し", reading: "ごうきぼくとつじんにちかし" },
  { text: "過ちを見て斯に仁を知る", reading: "あやまちをみてここにじんをしる" },
  { text: "己を修めて人を安んず", reading: "おのれをおさめてひとをやすんず" },
  { text: "人遠慮無ければ必ず近憂あり", reading: "ひとえんりょなければかならずきんゆうあり" },
  { text: "小人閑居して不善を為す", reading: "しょうじんかんきょしてふぜんをなす" },
  { text: "修身斉家治国平天下", reading: "しゅうしんせいかちこくへいてんか" },
  { text: "唯仁者のみ能く人を好み能く人を悪む", reading: "ただじんしゃのみよくひとをこのみよくひとをにくむ" },
  { text: "上善は水の如し", reading: "じょうぜんはみずのごとし" },
  { text: "足るを知る者は富む", reading: "たるをしるものはとむ" },
  { text: "胡蝶の夢", reading: "こちょうのゆめ" },
  { text: "兵は詭道なり", reading: "へいはきどうなり" },
  { text: "百戦百勝は善の善なる者に非ざるなり", reading: "ひゃくせんひゃくしょうはぜんのぜんなるものにあらざるなり" },
  { text: "惻隠の心は仁の端なり", reading: "そくいんのこころはじんのたんなり" },
  { text: "生を捨てて義を取る", reading: "せいをすててぎをとる" },
  { text: "善人なおもて往生をとぐ、いわんや悪人をや", reading: "ぜんにんなおもておうじょうをとぐいわんやあくにんをや" },
  { text: "身心脱落", reading: "しんじんだつらく" },
  { text: "虚しく往きて実ちて帰る", reading: "むなしくゆきてみちてかえる" },
  { text: "災難に逢う時節には災難に逢うがよく候", reading: "さいなんにあうじせつにはさいなんにあうがよくそうろう" },
  { text: "東海の小島の磯の白砂に我泣きぬれて蟹とたわむる", reading: "とうかいのこじまのいそのしらすなにわれなきぬれてかにとたわむる" },
  { text: "ふるさとの山に向いて言うことなし ふるさとの山はありがたきかな", reading: "ふるさとのやまにむいていうことなしふるさとのやまはありがたきかな" },
  { text: "山路来て何やらゆかしすみれ草", reading: "やまじきてなにやらゆかしすみれぐさ" },
  { text: "荒海や佐渡によこたふ天河", reading: "あらうみやさどによこたうあまのがわ" },
  { text: "赤い椿白い椿と落ちにけり", reading: "あかいつばきしろいつばきとおちにけり" },
  { text: "心を燃やせ", reading: "こころをもやせ" },
  { text: "迷いは晴れる、進めば", reading: "まよいははれるすすめば" },
  { text: "夢を見る力が人生を変える", reading: "ゆめをみるちからがじんせいをかえる" },
  { text: "笑顔の数だけ幸せになれる", reading: "えがおのかずだけしあわせになれる" },
  { text: "誰かの支えになれる自分でありたい", reading: "だれかのささえになれるじぶんでありたい" },
  { text: "今日の一歩が明日を作る", reading: "きょうのいっぽがあすをつくる" },
  { text: "できないと決めつけるな", reading: "できないときめつけるな" },
  { text: "挑戦こそが人生を彩る", reading: "ちょうせんこそがじんせいをいろどる" },
  { text: "心の奥にある声を聞け", reading: "こころのおくにあるこえをきけ" },
  { text: "諦めた先に道はない", reading: "あきらめたさきにみちはない" },
  { text: "涙の後には必ず晴れる", reading: "なみだのあとにはかならずはれる" },
  { text: "自分を信じることから全ては始まる", reading: "じぶんをしんじることからすべてははじまる" },
  { text: "過去は変えられぬが今は変えられる", reading: "かこはかえられぬがいまはかえられる" },
  { text: "小さな灯りでも闇を照らす", reading: "ちいさなあかりでもやみをてらす" },
  { text: "人は何度でもやり直せる", reading: "ひとはなんどでもやりなおせる" },
  { text: "心が折れても骨は折れない", reading: "こころがおれてもほねはおれない" },
  { text: "今この瞬間を大切に生きる", reading: "いまこのしゅんかんをたいせつにいきる" },
  { text: "苦しみは成長のしるしだ", reading: "くるしみはせいちょうのしるしだ" },
  { text: "一歩一歩が景色を変える", reading: "いっぽいっぽがけしきをかえる" },
  { text: "心に決めた道を進め", reading: "こころにきめたみちをすすめ" },
  { text: "弱さを知る者こそ本当に強い", reading: "よわさをしるものこそほんとうにつよい" },
  { text: "変わろうとする勇気を持て", reading: "かわろうとするゆうきをもて" },
  { text: "誰も見ていなくても手を抜くな", reading: "だれもみていなくてもてをぬくな" },
  { text: "続けることに意味がある", reading: "つづけることにいみがある" },
  { text: "明日を信じて今日を生きる", reading: "あすをしんじてきょうをいきる" },
  { text: "悔いのない選択をせよ", reading: "くいのないせんたくをせよ" },
  { text: "心の底から笑える日を作れ", reading: "こころのそこからわらえるひをつくれ" },
  { text: "夢見る心を忘れるな", reading: "ゆめみるこころをわすれるな" },
  { text: "全力を尽くせば後悔はない", reading: "ぜんりょくをつくせばこうかいはない" },
  { text: "光は闇の中でこそ輝く", reading: "ひかりはやみのなかでこそかがやく" },
  { text: "迷った時は初心を思い出せ", reading: "まよったときはしょしんをおもいだせ" },
  { text: "挑む者だけが景色を変えられる", reading: "いどむものだけがけしきをかえられる" },
  { text: "誰かを想う心が人を強くする", reading: "だれかをおもうこころがひとをつよくする" },
  { text: "昨日より一歩前へ", reading: "きのうよりいっぽまえへ" },
  { text: "心の中の火を絶やすな", reading: "こころのなかのひをたやすな" },
  { text: "出会いが人を変える", reading: "であいがひとをかえる" },
  { text: "一歩踏み出せば景色が変わる", reading: "いっぽふみだせばけしきがかわる" },
  { text: "静かな努力ほど強いものはない", reading: "しずかなどりょくほどつよいものはない" },
  { text: "生きるとは選び続けることだ", reading: "いきるとはえらびつづけることだ" },
  { text: "心が定まれば道は開ける", reading: "こころがさだまればみちはひらける" },
  { text: "涙も笑顔も自分を作る糧だ", reading: "なみだもえがおもじぶんをつくるかてだ" },
  { text: "諦めない心が奇跡を呼ぶ", reading: "あきらめないこころがきせきをよぶ" },
  { text: "挑戦する者に失敗はあっても後悔はない", reading: "ちょうせんするものにしっぱいはあってもこうかいはない" },
  { text: "未来は誰にも見えないから面白い", reading: "みらいはだれにもみえないからおもしろい" },
  { text: "今日という日をもう一度生きられたら", reading: "きょうというひをもういちどいきられたら" },
  { text: "心にしまった夢を取り出せ", reading: "こころにしまったゆめをとりだせ" },
  { text: "頑張る姿は誰かの光になる", reading: "がんばるすがたはだれかのひかりになる" },
  { text: "迷いながらも前を向く", reading: "まよいながらもまえをむく" },
  { text: "一日の終わりに笑えるように生きよ", reading: "いちにちのおわりにわらえるようにいきよ" },
  { text: "心の声に嘘をつくな", reading: "こころのこえにうそをつくな" },
  { text: "諦めの二文字を捨てよ", reading: "あきらめのにもじをすてよ" },
  { text: "挑戦なくして成長なし", reading: "ちょうせんなくしてせいちょうなし" },
  { text: "苦しい時こそ本当の自分が見える", reading: "くるしいときこそほんとうのじぶんがみえる" },
  { text: "誰かの一言で人生は変わる", reading: "だれかのひとことでじんせいはかわる" },
  { text: "心の中の子どもを忘れるな", reading: "こころのなかのこどもをわすれるな" },
  { text: "一つの決意が未来を変える", reading: "ひとつのけついがみらいをかえる" },
  { text: "涙は心の汗である", reading: "なみだはこころのあせである" },
  { text: "明日を憂うより今日を生きよ", reading: "あすをうれうよりきょうをいきよ" },
  { text: "己に勝つ者こそ真の強者だ", reading: "おのれにかつものこそしんのきょうしゃだ" },
  { text: "心の平穏こそ何よりの財産だ", reading: "こころのへいおんこそなによりのざいさんだ" },
  { text: "迷いは行動によって消え去る", reading: "まよいはこうどうによってきえさる" },
  { text: "小さな親切が世界を明るくする", reading: "ちいさなしんせつがせかいをあかるくする" },
  { text: "挫けそうな時こそ胸を張れ", reading: "くじけそうなときこそむねをはれ" },
  { text: "心に太陽を宿せ", reading: "こころにたいようをやどせ" },
  { text: "一度きりの命を大切に生きよ", reading: "いちどきりのいのちをたいせつにいきよ" },
  { text: "涙の数だけ強くなれる", reading: "なみだのかずだけつよくなれる" },
  { text: "目の前の一歩を信じて進め", reading: "めのまえのいっぽをしんじてすすめ" },
  { text: "心を尽くせば必ず伝わる", reading: "こころをつくせばかならずつたわる" },
  { text: "迷いの中にこそ答えがある", reading: "まよいのなかにこそこたえがある" },
  { text: "諦めた瞬間に夢は終わる", reading: "あきらめたしゅんかんにゆめはおわる" },
  { text: "心の傷は誰かを思いやる力になる", reading: "こころのきずはだれかをおもいやるちからになる" },
  { text: "何度倒れても立ち上がればいい", reading: "なんどたおれてもたちあがればいい" },
  { text: "一つの笑顔が誰かを救うことがある", reading: "ひとつのえがおがだれかをすくうことがある" },
  { text: "心の準備が整えば道は開ける", reading: "こころのじゅんびがととのえばみちはひらける" },
  { text: "挑戦する心を忘れた時、人は老いる", reading: "ちょうせんするこころをわすれたときひとはおいる" },
  { text: "一瞬一瞬を大切に生きよ", reading: "いっしゅんいっしゅんをたいせつにいきよ" },
  { text: "心の中の灯を消すな", reading: "こころのなかのひをけすな" },
  { text: "涙を流した分だけ人は優しくなれる", reading: "なみだをながしたぶんだけひとはやさしくなれる" },
  { text: "何もしないことが一番の後悔になる", reading: "なにもしないことがいちばんのこうかいになる" },
  { text: "心が広ければ道も広がる", reading: "こころがひろければみちもひろがる" },
  { text: "一日一日を積み重ねた先に未来がある", reading: "いちにちいちにちをつみかさねたさきにみらいがある" },
  { text: "迷った時は自分の心に聞け", reading: "まよったときはじぶんのこころにきけ" },
  { text: "挑む勇気が人生を切り開く", reading: "いどむゆうきがじんせいをきりひらく" },
  { text: "心が折れそうな夜こそ朝を信じよ", reading: "こころがおれそうなよるこそあさをしんじよ" },
  { text: "一つの出会いが人生を彩る", reading: "ひとつのであいがじんせいをいろどる" },
  { text: "涙も笑顔もすべて自分の物語だ", reading: "なみだもえがおもすべてじぶんのものがたりだ" },
  { text: "諦めなければ道は必ず見える", reading: "あきらめなければみちはかならずみえる" },
  { text: "心の中の可能性を信じよ", reading: "こころのなかのかのうせいをしんじよ" },
  { text: "一歩ずつでも歩み続ければ辿り着く", reading: "いっぽずつでもあゆみつづければたどりつく" },
  { text: "挑戦する心こそが青春だ", reading: "ちょうせんするこころこそがせいしゅんだ" },
  { text: "石橋を叩いても渡らない", reading: "いしばしをたたいてもわたらない", note: "意味: 用心深すぎてかえって行動できないことのたとえ" },
  { text: "転石苔を生ぜず", reading: "てんせきこけをしょうぜず", note: "意味: 職業や住居を転々と変える人は大成しないというたとえ" },
  { text: "好事門を出でず悪事千里を行く", reading: "こうじもんをいでずあくじせんりをいく", note: "意味: 良い行いは知られにくいが悪い行いはすぐ世間に広まるということ" },
  { text: "医者と味噌は古いほどよい", reading: "いしゃとみそはふるいほどよい", note: "意味: 経験を積んだ医者や熟成した味噌は良いものだというたとえ" },
  { text: "病は気から", reading: "やまいはきから", note: "意味: 病気は気の持ちようで悪化したり回復したりするということ" },
  { text: "命あっての物種", reading: "いのちあってのものだね", note: "意味: どんなことも命があってこそ成り立つものだということ" },
  { text: "命長ければ恥多し", reading: "いのちながければはじおおし", note: "意味: 長生きするとその分恥をかくことも多くなるということ" },
  { text: "老いの一徹", reading: "おいのいってつ", note: "意味: 年をとると考えを変えず頑固になりやすいこと" },
  { text: "老いてはますます壮んなるべし", reading: "おいてはますますさかんなるべし", note: "意味: 年をとってもなお盛んに気力を保つべきだという教え" },
  { text: "実の生る木は花から知れる", reading: "みのなるきははなからしれる", note: "意味: 将来大成する人物は幼い頃からその片鱗が見えるというたとえ" },
  { text: "栴檀は双葉より芳し", reading: "せんだんはふたばよりかんばし", note: "意味: 大成する人は幼い頃から優れた才能の片鱗を見せるということ" },
  { text: "瓢箪から駒が出る", reading: "ひょうたんからこまがでる", note: "意味: 意外なところから思いがけない事実や結果が出ることのたとえ" },
  { text: "濡れぬ先の傘", reading: "ぬれぬさきのかさ", note: "意味: 災難が起こる前にあらかじめ用心しておくことのたとえ" },
  { text: "明日ありと思う心の仇桜", reading: "あすありとおもうこころのあだざくら", note: "意味: 明日があると油断していると思わぬ災いにあうことのたとえ" },
  { text: "人生は朝露の如し", reading: "じんせいはちょうろのごとし", note: "意味: 人の一生ははかなく短いものだというたとえ" },
  { text: "盛者必衰", reading: "じょうしゃひっすい", note: "意味: 勢いの盛んな者もいつか必ず衰えるということ" },
  { text: "驕る平家は久しからず", reading: "おごるへいけはひさしからず", note: "意味: 権勢に驕り高ぶる者は長くは続かないというたとえ" },
  { text: "後悔先に立たず", reading: "こうかいさきにたたず", note: "意味: 事が終わった後にいくら後悔しても取り返しがつかないということ" },
  { text: "病膏肓に入る", reading: "やまいこうこうにいる", note: "意味: 物事に熱中しすぎてどうにも手がつけられない状態になることのたとえ" },
  { text: "医食同源", reading: "いしょくどうげん", note: "意味: 病気の治療も日常の食事も健康を保つという点で同じ源から出ているという考え" },
  { text: "腹八分目に医者いらず", reading: "はらはちぶんめにいしゃいらず", note: "意味: 食事は満腹まで食べず腹八分目にしておけば健康でいられるということ" },
  { text: "食べず嫌い", reading: "たべずぎらい", note: "意味: 実際に試さないまま嫌うこと" },
  { text: "京の着倒れ大阪の食い倒れ", reading: "きょうのきだおれおおさかのくいだおれ", note: "意味: 京都の人は衣服に、大阪の人は食に財産を使い果たすほど贅沢するということ" },
  { text: "光陰惜しむべし", reading: "こういんおしむべし", note: "意味: 過ぎゆく時間は貴重なので大切にすべきだという教え" },
  { text: "老馬の智用うべし", reading: "ろうばのちもちいべし", note: "意味: 経験を積んだ年配者の知恵は役に立つということ" },
  { text: "経験に勝る教師なし", reading: "けいけんにまさるきょうしなし", note: "意味: 実際の経験ほど優れた教えを与えてくれるものはないということ" },
  { text: "習うより慣れよ", reading: "ならうよりなれよ", note: "意味: 人に教わるよりも実際に経験を重ねる方が身につくということ" },
  { text: "石を抱いて淵に入る", reading: "いしをいだいてふちにいる", note: "意味: 自分から進んで危険な状況に飛び込んでしまうことのたとえ" },
  { text: "虎の尾を踏む", reading: "とらのおをふむ", note: "意味: 非常に危険なことを行うたとえ" },
  { text: "命の綱", reading: "いのちのつな", note: "意味: 生きていくうえで頼りとする最も大切なもののたとえ" },
  { text: "芸術は長く人生は短し", reading: "げいじゅつはながくじんせいはみじかし", note: "意味: 優れた芸術作品は永く残るが人の一生は短いということ" },
  { text: "大海の一滴", reading: "たいかいのいってき", note: "意味: 広大なものの中のごくわずかな一部分のたとえ" },

  { text: "栄枯盛衰", reading: "えいこせいすい", note: "意味: 栄えることと衰えることを繰り返す世の中の移り変わり" },

  { text: "比翼連理", reading: "ひよくれんり", note: "意味: 男女や夫婦の情愛が深く仲むつまじいことのたとえ" },
  { text: "一蓮托生", reading: "いちれんたくしょう", note: "意味: 結果がどうであれ行動や運命を共にすること" },

  { text: "韓信の股くぐり", reading: "かんしんのまたくぐり", note: "意味: 大きな目的のために一時の屈辱を耐え忍ぶことのたとえ" },
  { text: "不易流行", reading: "ふえきりゅうこう", note: "意味: いつまでも変わらない本質と、時代とともに変化するものとの両方が大切だということ" },

  { text: "品行方正", reading: "ひんこうほうせい", note: "意味: 行いや態度が正しくきちんとしていること" },

  { text: "紆余曲折", reading: "うよきょくせつ", note: "意味: 事情が込み入っていて、物事が何度も変化しながら進むこと" },
  { text: "各人各様", reading: "かくじんかくよう", note: "意味: 人それぞれにやり方や考え方が違うこと" },

      let consumed;
      if (YOON_ALT[two]) {
        baseAlts = YOON_ALT[two];
        consumed = 3;
      } else {
        baseAlts = SINGLE_ALT[chars[i + 1]] || [chars[i + 1]];
        consumed = 2;
      }
      const alts = baseAlts.map((a) => (a.startsWith('ch') ? 't' : a[0]) + a);
      units.push({ display: alts[0], alternatives: alts });
      i += consumed;
      continue;
    }
    const two = chars.slice(i, i + 2).join('');
    if (YOON_ALT[two]) {
      units.push({ display: YOON_ALT[two][0], alternatives: YOON_ALT[two] });
      i += 2;
      continue;
    }
    const alts = SINGLE_ALT[c] || [c];
    units.push({ display: alts[0], alternatives: alts });
    i += 1;
  }
  return units;
}

function buildUnitsFromText(text) {
  return text.split('').map((ch) => ({ display: ch, alternatives: [ch] }));
}

function getQuoteUnits(mode, index) {
  if (mode === 'en') {
    return { units: buildUnitsFromText(QUOTES_EN[index]), reference: null, note: null, reading: null };
  }
  const q = QUOTES_JA[index];
  return { units: buildUnitsFromReading(q.reading), reference: q.text, note: q.note || null, reading: q.reading };
}

function quoteCount(mode) {
  return mode === 'en' ? QUOTES_EN.length : QUOTES_JA.length;
}

function pickNextIndex(prevIndex, total) {
  if (total <= 1) return 0;
  let idx = Math.floor(Math.random() * total);
  while (idx === prevIndex) {
    idx = Math.floor(Math.random() * total);
  }
  return idx;
}

const AUTH_ERROR_MESSAGES = {
  'auth/api-key-not-valid.-please-pass-a-valid-api-key.': 'Firebaseの設定が正しくありません。firebase-config.js の内容を確認してください。',
  'auth/invalid-api-key': 'Firebaseの設定が正しくありません。firebase-config.js の内容を確認してください。',
  'auth/invalid-email': 'メールアドレスの形式が正しくありません。',
  'auth/user-disabled': 'このアカウントは無効化されています。',
  'auth/unauthorized-continue-uri': 'このサイトのドメインがFirebaseの「承認済みドメイン」に登録されていません。',
  'auth/network-request-failed': '通信エラーが発生しました。ネットワーク接続を確認してください。',
  'auth/email-already-in-use': 'このメールアドレスはすでに登録されています。「ログイン」をお試しください。',
  'auth/weak-password': 'パスワードは6文字以上で設定してください。',
  'auth/wrong-password': 'パスワードが正しくありません。',
  'auth/missing-password': 'パスワードを入力してください。',
  'auth/user-not-found': 'このメールアドレスはまだ登録されていません。「新規登録」をお試しください。',
  'auth/invalid-credential': 'メールアドレスまたはパスワードが正しくありません。',
  'permission-denied': 'データへのアクセスが拒否されました。Firestoreのセキュリティルールを確認してください。',
};

function friendlyAuthError(err) {
  return AUTH_ERROR_MESSAGES[err.code] || err.message;
}

function App() {
  const [screen, setScreen] = useState('top');
  const [authLoading, setAuthLoading] = useState(true);
  const [authUser, setAuthUser] = useState(null);
  const [authError, setAuthError] = useState('');
  const [emailInput, setEmailInput] = useState('');
  const [passwordInput, setPasswordInput] = useState('');
  const [cumulativeTotal, setCumulativeTotal] = useState(0);
  const [cumulativeCorrect, setCumulativeCorrect] = useState(0);

  const authUserRef = useRef(null);
  const cumulativeTotalRef = useRef(0);
  const cumulativeCorrectRef = useRef(0);

  useEffect(() => { authUserRef.current = authUser; }, [authUser]);

  useEffect(() => {
    if (typeof firebase === 'undefined' || !firebase.apps || !firebase.apps.length) {
      setAuthError('Firebaseの設定が完了していません。firebase-config.js を確認してください。');
      setAuthLoading(false);
      return;
    }
    const auth = firebase.auth();

    const unsubscribe = auth.onAuthStateChanged((u) => {
      setAuthUser(u);
      setAuthLoading(false);
      if (u) {
        firebase.firestore().collection('typingStats').doc(u.uid).get()
          .then((doc) => {
            const data = doc.data();
            const total = (data && data.totalTyped) || 0;
            const correct = (data && data.correctTyped) || 0;
            cumulativeTotalRef.current = total;
            cumulativeCorrectRef.current = correct;
            setCumulativeTotal(total);
            setCumulativeCorrect(correct);
          })
          .catch((err) => setAuthError(friendlyAuthError(err)));
      }
    });

    return () => unsubscribe();
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    setAuthError('');
    const email = emailInput.trim();
    if (!email || !passwordInput) return;
    firebase.auth().signInWithEmailAndPassword(email, passwordInput)
      .catch((err) => setAuthError(friendlyAuthError(err)));
  };

  const handleRegister = () => {
    setAuthError('');
    const email = emailInput.trim();
    if (!email || !passwordInput) return;
    firebase.auth().createUserWithEmailAndPassword(email, passwordInput)
      .catch((err) => setAuthError(friendlyAuthError(err)));
  };

  const handleLogout = () => {
    firebase.auth().signOut();
    setCumulativeTotal(0);
    setCumulativeCorrect(0);
  };

  const [mode, setMode] = useState('ja');
  const [quoteIndex, setQuoteIndex] = useState(() => Math.floor(Math.random() * quoteCount('ja')));
  const [quoteInfo, setQuoteInfo] = useState(() => getQuoteUnits('ja', quoteIndex));
  const [completedTexts, setCompletedTexts] = useState([]);
  const [unitIndex, setUnitIndex] = useState(0);
  const [typedOffset, setTypedOffset] = useState(0);
  const [candidates, setCandidates] = useState(() => quoteInfo.units[0]?.alternatives || []);
  const [wrongFlag, setWrongFlag] = useState(false);
  const [totalTyped, setTotalTyped] = useState(0);
  const [correctTyped, setCorrectTyped] = useState(0);
  const [showResult, setShowResult] = useState(false);

  const modeRef = useRef(mode);
  const quoteIndexRef = useRef(quoteIndex);
  const quoteInfoRef = useRef(quoteInfo);
  const completedTextsRef = useRef(completedTexts);
  const unitIndexRef = useRef(unitIndex);
  const typedOffsetRef = useRef(typedOffset);
  const candidatesRef = useRef(candidates);
  const pendingCommitRef = useRef(null);
  const showResultRef = useRef(showResult);

  useEffect(() => { showResultRef.current = showResult; }, [showResult]);

  const advanceToNextQuote = useCallback((forMode) => {
    const total = quoteCount(forMode);
    const nextIdx = pickNextIndex(quoteIndexRef.current, total);
    const nextInfo = getQuoteUnits(forMode, nextIdx);
    const firstCands = nextInfo.units[0]?.alternatives || [];

    quoteIndexRef.current = nextIdx;
    quoteInfoRef.current = nextInfo;
    completedTextsRef.current = [];
    unitIndexRef.current = 0;
    typedOffsetRef.current = 0;
    candidatesRef.current = firstCands;
    pendingCommitRef.current = null;

    setQuoteIndex(nextIdx);
    setQuoteInfo(nextInfo);
    setCompletedTexts([]);
    setUnitIndex(0);
    setTypedOffset(0);
    setCandidates(firstCands);
    setWrongFlag(false);
  }, []);

  // Commits a finished unit (e.g. "n" for ん) and moves on to the next unit.
  // Returns the new unit index, or null if the quote finished and a new one started.
  const commitUnit = useCallback((completedStr, uIdx, units) => {
    const newCompleted = completedTextsRef.current.concat([completedStr]);
    completedTextsRef.current = newCompleted;
    setCompletedTexts(newCompleted);

    const nextUnitIdx = uIdx + 1;
    unitIndexRef.current = nextUnitIdx;
    typedOffsetRef.current = 0;
    pendingCommitRef.current = null;
    setUnitIndex(nextUnitIdx);
    setTypedOffset(0);

    if (nextUnitIdx >= units.length) {
      advanceToNextQuote(modeRef.current);
      return null;
    }
    const nextCands = units[nextUnitIdx].alternatives;
    candidatesRef.current = nextCands;
    setCandidates(nextCands);
    return nextUnitIdx;
  }, [advanceToNextQuote]);

  const handleKeyDown = useCallback((e) => {
    if (!authUserRef.current) return;
    if (showResultRef.current) return;
    if (e.isComposing || e.keyCode === 229) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length !== 1) return;

    e.preventDefault();

    const units = quoteInfoRef.current.units;
    let uIdx = unitIndexRef.current;
    if (uIdx >= units.length) return;

    const typed = e.key;
    let offset = typedOffsetRef.current;
    let cands = candidatesRef.current;
    let matching = cands.filter((c) => c[offset] === typed);

    // e.g. "ん" has alternatives ["n", "nn"]. If "n" was already a complete
    // match but "nn" is still possible, this key may actually belong to the
    // next unit (the shorter reading was intended). Commit the short reading
    // and retry this key against the next unit instead of flagging it wrong.
    if (matching.length === 0 && pendingCommitRef.current) {
      const nextUnitIdx = commitUnit(pendingCommitRef.current, uIdx, units);
      if (nextUnitIdx === null) return;
      uIdx = nextUnitIdx;
      offset = 0;
      cands = candidatesRef.current;
      matching = cands.filter((c) => c[offset] === typed);
    }

    setTotalTyped((t) => t + 1);

    if (matching.length === 0) {
      setWrongFlag(true);
      return;
    }

    setWrongFlag(false);
    setCorrectTyped((c) => c + 1);

    const newOffset = offset + 1;
    const exactMatches = matching.filter((c) => c.length === newOffset);
    const longerMatches = matching.filter((c) => c.length > newOffset);

    if (exactMatches.length > 0 && longerMatches.length > 0) {
      // Ambiguous: a shorter alternative just completed but a longer one
      // (e.g. "nn") is still viable. Keep both alive and remember the short one.
      pendingCommitRef.current = exactMatches[0];
      typedOffsetRef.current = newOffset;
      candidatesRef.current = matching;
      setTypedOffset(newOffset);
      setCandidates(matching);
    } else if (exactMatches.length > 0) {
      commitUnit(exactMatches[0], uIdx, units);
    } else {
      pendingCommitRef.current = null;
      typedOffsetRef.current = newOffset;
      candidatesRef.current = matching;
      setTypedOffset(newOffset);
      setCandidates(matching);
    }
  }, [commitUnit]);

  useEffect(() => {
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [handleKeyDown]);

  const handleFinish = () => {
    setShowResult(true);
    const user = authUserRef.current;
    if (user) {
      const newTotal = cumulativeTotalRef.current + totalTyped;
      const newCorrect = cumulativeCorrectRef.current + correctTyped;
      cumulativeTotalRef.current = newTotal;
      cumulativeCorrectRef.current = newCorrect;
      setCumulativeTotal(newTotal);
      setCumulativeCorrect(newCorrect);
      firebase.firestore().collection('typingStats').doc(user.uid).set({
        totalTyped: newTotal,
        correctTyped: newCorrect,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }, { merge: true }).catch((err) => setAuthError(friendlyAuthError(err)));
    }
  };

  const startFresh = useCallback((forMode) => {
    setTotalTyped(0);
    setCorrectTyped(0);
    setShowResult(false);
    quoteIndexRef.current = -1;
    advanceToNextQuote(forMode);
  }, [advanceToNextQuote]);

  const handleRestart = () => {
    startFresh(modeRef.current);
  };

  const handleModeToggle = () => {
    const nextMode = modeRef.current === 'ja' ? 'en' : 'ja';
    modeRef.current = nextMode;
    setMode(nextMode);
    startFresh(nextMode);
  };

  const accuracy = totalTyped > 0 ? ((correctTyped / totalTyped) * 100).toFixed(1) : '0.0';

  const resolvedPrefix = completedTexts.join('');
  const currentUnit = quoteInfo.units[unitIndex];
  const preview = currentUnit ? (candidates[0] || '').slice(typedOffset) : '';
  const future = quoteInfo.units.slice(unitIndex + 1).map((u) => u.display).join('');
  const displayTarget = resolvedPrefix + preview + future;
  const currentPos = resolvedPrefix.length;

  if (screen === 'top') {
    return (
      <div className="flex flex-col items-center">
        <h1 className="gothic-font text-4xl sm:text-6xl font-black text-[#3a2f1e] tracking-wide">
          無限タイピング
        </h1>
        <button
          onClick={() => setScreen('app')}
          className="retro-btn mt-14 px-10 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
        >
          はじめる
        </button>
      </div>
    );
  }

  if (authLoading) {
    return (
      <div className="paper-card rounded-sm px-10 py-10 text-center">
        <p className="typewriter-font text-[#8a7a56]">読み込み中...</p>
      </div>
    );
  }

  if (!authUser) {
    return (
      <div className="relative w-full max-w-md">
        <div className="paper-card rounded-sm px-10 py-12 text-center">
          <h1 className="typewriter-font text-2xl text-[#3a2f1e] mb-2">無限タイピング</h1>
          <p className="text-xs text-[#8a7a56] mb-8 tracking-wide">メールアドレスとパスワードでログインしてください</p>

          <form onSubmit={handleLogin}>
            <input
              type="email"
              required
              value={emailInput}
              onChange={(e) => setEmailInput(e.target.value)}
              placeholder="you@example.com"
              className="typewriter-font w-full px-4 py-3 mb-4 rounded-sm border border-[#d9cba8] bg-[#faf5e9] text-[#3a2f1e] text-center focus:outline-none focus:border-[#8a7a56]"
            />
            <input
              type="password"
              required
              value={passwordInput}
              onChange={(e) => setPasswordInput(e.target.value)}
              placeholder="パスワード"
              className="typewriter-font w-full px-4 py-3 mb-4 rounded-sm border border-[#d9cba8] bg-[#faf5e9] text-[#3a2f1e] text-center focus:outline-none focus:border-[#8a7a56]"
            />
            <button
              type="submit"
              className="retro-btn w-full px-5 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
            >
              ログイン
            </button>
            <button
              type="button"
              onClick={handleRegister}
              className="retro-btn w-full mt-3 px-5 py-3 bg-transparent text-[#5c4a32] border border-[#5c4a32] tracking-wider hover:bg-[#5c4a32]/10 active:scale-95 transition"
            >
              新規登録
            </button>
          </form>

          {authError && (
            <p className="text-xs text-[#a13d2e] mt-4">{authError}</p>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="relative w-full max-w-3xl">
      <div className="ink-stain w-64 h-64 -top-10 -left-16"></div>
      <div className="ink-stain w-72 h-72 -bottom-16 -right-10"></div>

      <div className="fixed top-5 left-1/2 -translate-x-1/2 z-20 text-xs text-[#8a7a56] typewriter-font flex items-center gap-3">
        <span>{authUser.email}</span>
        <button onClick={handleLogout} className="underline hover:text-[#5c4a32]">ログアウト</button>
      </div>

      <button
        onClick={handleModeToggle}
        className="retro-btn fixed top-5 left-5 z-20 px-5 py-2 bg-[#5c4a32] text-[#f4ecd8] text-sm tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
      >
        {mode === 'ja' ? 'English' : '日本語'}
      </button>

      <button
        onClick={handleFinish}
        className="retro-btn fixed top-5 right-5 z-20 px-5 py-2 bg-[#5c4a32] text-[#f4ecd8] text-sm tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
      >
        終わり
      </button>

      <div className="paper-card relative rounded-sm px-8 py-14 sm:px-14 sm:py-16 min-h-[280px] sm:min-h-[340px] flex flex-col justify-center">
        <p className="text-center text-xs text-[#8a7a56] mb-8 tracking-[0.3em] uppercase typewriter-font">
          Endless Typing
        </p>

        {quoteInfo.reference && (
          <p className="mincho-font text-lg sm:text-xl text-center text-[#8a7a56] mb-[5mm] select-none break-words">
            <ruby>
              {quoteInfo.reference}
              <rt className="text-[10px] sm:text-xs text-[#a89a78] tracking-normal">{quoteInfo.reading}</rt>
            </ruby>
          </p>
        )}

        <p className="mincho-font text-xl sm:text-2xl leading-relaxed sm:leading-loose text-[#3a2f1e] select-none break-words text-center">
          {displayTarget.split('').map((ch, i) => {
            let cls = 'char-pending';
            if (i < currentPos) cls = 'char-correct';
            else if (i === currentPos) cls = wrongFlag ? 'char-current-wrong' : 'char-current';
            return (
              <span key={i} className={cls}>
                {ch === ' ' ? ' ' : ch}
              </span>
            );
          })}
        </p>

        {quoteInfo.note && (
          <p className="typewriter-font text-xs sm:text-sm text-center text-[#a89a78] mt-6 select-none break-words">
            {quoteInfo.note}
          </p>
        )}
      </div>

      <p className="text-center mt-6 text-[#8a7a56] text-xs typewriter-font tracking-wide">
        【終わり】を押すまで続きます
      </p>

      {showResult && (
        <div className="fixed inset-0 bg-[#2a2117]/60 flex items-center justify-center z-30 p-4">
          <div className="paper-card rounded-sm px-10 py-10 w-full max-w-sm text-center relative">
            <h2 className="typewriter-font text-2xl text-[#3a2f1e] mb-8 tracking-wide">Result</h2>

            <div className="mb-6">
              <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">総タイプ文字数</p>
              <p className="typewriter-font text-3xl text-[#3a2f1e]">{totalTyped}</p>
            </div>

            <div className="mb-6">
              <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">正誤率</p>
              <p className="typewriter-font text-3xl text-[#3a2f1e]">{accuracy}%</p>
            </div>

            <div className="mb-9 pt-4 border-t border-[#d9cba8]">
              <p className="text-xs text-[#8a7a56] tracking-[0.2em] uppercase mb-1">累計タイプ数(全端末合計)</p>
              <p className="typewriter-font text-2xl text-[#3a2f1e]">{cumulativeTotal}</p>
            </div>

            <button
              onClick={handleRestart}
              className="retro-btn w-full px-5 py-3 bg-[#5c4a32] text-[#f4ecd8] tracking-wider shadow-md hover:bg-[#493a27] active:scale-95 transition"
            >
              もう一度
            </button>

            <button
              onClick={() => setScreen('top')}
              className="retro-btn w-full mt-3 px-5 py-3 bg-transparent text-[#5c4a32] border border-[#5c4a32] tracking-wider hover:bg-[#5c4a32]/10 active:scale-95 transition"
            >
              トップに戻る
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
